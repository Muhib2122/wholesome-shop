<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<h3>Add Product</h3>
<input id="n" placeholder="Name">
<input id="p" placeholder="Price">
<input id="i" placeholder="Image URL">
<button onclick="add()">Add</button>

<h3>Products</h3>
<div id="pro"></div>

<h3>Orders</h3>
<div id="ord"></div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// ADD
function add(){
fetch(URL+"/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:n.value},
price:{integerValue:String(p.value)},
image:{stringValue:i.value}
}
})
}).then(loadPro);
}

// LOAD PRODUCTS
async function loadPro(){
let r=await fetch(URL+"/products");
let d=await r.json();

pro.innerHTML="";

d.documents?.forEach(x=>{
let id=x.name.split("/").pop();
let f=x.fields;

pro.innerHTML+=`
<div style="border:1px solid #ccc;margin:5px;padding:5px;">
<img src="${f.image.stringValue}" width="50"><br>

<input id="name_${id}" value="${f.name.stringValue}">
<input id="price_${id}" value="${f.price.integerValue}">
<input id="img_${id}" value="${f.image.stringValue}">

<br>
<button onclick="updatePro('${id}')">Update</button>
<button onclick="del('${id}')">Delete</button>
</div>`;
});
}

// UPDATE PRODUCT 🔥
function updatePro(id){
let name=document.getElementById("name_"+id).value;
let price=document.getElementById("price_"+id).value;
let img=document.getElementById("img_"+id).value;

fetch(URL+"/products/"+id,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:name},
price:{integerValue:String(price)},
image:{stringValue:img}
}
})
}).then(loadPro);
}

// DELETE
function del(id){
fetch(URL+"/products/"+id,{method:"DELETE"}).then(loadPro);
}

// LOAD ORDERS 🔥
async function loadOrd(){
let r=await fetch(URL+"/orders");
let d=await r.json();

ord.innerHTML="";

if(!d.documents){
ord.innerHTML="No orders";
return;
}

d.documents.forEach(x=>{
let id=x.name.split("/").pop();
let f=x.fields;

ord.innerHTML+=`
<div style="border:1px solid #999;margin:5px;padding:5px;">
TX: ${f.txid?.stringValue || ""}
<br>
Amount: ${f.amount?.integerValue || ""}
<br>
Status: ${f.status?.stringValue || ""}
<br>
<button onclick="updateOrder('${id}','approved')">Approve</button>
<button onclick="updateOrder('${id}','declined')">Decline</button>
</div>`;
});
}

// UPDATE ORDER
function updateOrder(id,status){
fetch(URL+"/orders/"+id,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{status:{stringValue:status}}
})
}).then(loadOrd);
}

loadPro();
loadOrd();

</script>

</body>
</html>
