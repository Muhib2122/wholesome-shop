<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{font-family:Arial;background:#f0f9ff;margin:0;}
.header{background:#38bdf8;color:white;padding:15px;text-align:center;}

input{width:100%;padding:10px;margin:5px 0;}
button{width:100%;padding:10px;background:#38bdf8;color:white;border:none;margin-top:5px;}

.card{background:white;padding:10px;margin:10px;}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<h3>Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>Products</h3>
<div id="products"></div>

<h3>Orders</h3>
<div id="orders"></div>

<script>

// 🔥 ADD PRODUCT (FIXED)
function addProduct(){

let n = document.getElementById("name").value.trim();
let p = document.getElementById("price").value.trim();
let i = document.getElementById("image").value.trim();

if(!n || !p || !i){
alert("Fill all fields");
return;
}

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
fields:{
name:{stringValue:n},
price:{integerValue:parseInt(p)},
image:{stringValue:i}
}
})
})
.then(res=>{
console.log(res);
return res.json();
})
.then(data=>{
console.log(data);
alert("Added ✅");
loadProducts();
})
.catch(err=>{
console.error(err);
alert("Error ❌");
});
}

// 🔥 LOAD PRODUCTS
async function loadProducts(){

let res = await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products");
let data = await res.json();

let div = document.getElementById("products");
div.innerHTML="";

if(!data.documents){
div.innerHTML="No products";
return;
}

data.documents.forEach(d=>{

let id = d.name.split("/").pop();
let f = d.fields;

div.innerHTML+=`
<div class="card">
${f.name.stringValue} - ${f.price.integerValue}
</div>
`;
});
}

// 🔥 LOAD ORDERS
async function loadOrders(){

let res = await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders");
let data = await res.json();

let div = document.getElementById("orders");
div.innerHTML="";

if(!data.documents){
div.innerHTML="No orders";
return;
}

data.documents.forEach(d=>{
let f = d.fields;

div.innerHTML+=`
<div class="card">
TX: ${f.txid.stringValue} <br>
Amount: ${f.amount.integerValue} <br>
Status: ${f.status.stringValue}
</div>
`;
});
}

loadProducts();
loadOrders();

</script>

</body>
</html>
