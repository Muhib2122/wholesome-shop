<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{font-family:Arial;margin:0;background:#f0f9ff;}
.header{background:#38bdf8;color:#fff;padding:15px;text-align:center;}

.section{padding:10px;}
.card{background:#fff;padding:10px;margin:10px 0;}

input{width:100%;padding:8px;margin:5px 0;}
button{background:#38bdf8;color:#fff;padding:8px;width:100%;}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div class="section">

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add</button>

<h3>Products</h3>
<div id="products"></div>

<h3>Orders</h3>
<div id="orders"></div>

</div>

<script>

// ADD PRODUCT
function addProduct(){
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:name.value},
price:{integerValue:price.value},
image:{stringValue:image.value}
}
})
}).then(()=>loadProducts());
}

// LOAD PRODUCTS
async function loadProducts(){
let res = await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products");
let data = await res.json();

let div = document.getElementById("products");
div.innerHTML="";

if(!data.documents){div.innerHTML="No products";return;}

data.documents.forEach(d=>{
let id = d.name.split("/").pop();
let f = d.fields;

div.innerHTML+=`
<div class="card">
${f.name.stringValue} - ${f.price.integerValue}
<button onclick="del('${id}')">Delete</button>
</div>
`;
});
}

// DELETE
function del(id){
fetch(`https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products/${id}`,{
method:"DELETE"
}).then(()=>loadProducts());
}

// LOAD ORDERS
async function loadOrders(){
let res = await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders");
let data = await res.json();

let div = document.getElementById("orders");
div.innerHTML="";

if(!data.documents){div.innerHTML="No orders";return;}

data.documents.forEach(d=>{
let id = d.name.split("/").pop();
let f = d.fields;

div.innerHTML+=`
<div class="card">
TX: ${f.txid.stringValue} <br>
Amount: ${f.amount.integerValue} <br>
Status: ${f.status.stringValue}

<button onclick="approve('${id}')">Approve</button>
</div>
`;
});
}

// APPROVE
function approve(id){
fetch(`https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders/${id}?updateMask.fieldPaths=status`,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{status:{stringValue:"approved"}}
})
}).then(()=>loadOrders());
}

loadProducts();
loadOrders();

</script>

</body>
</html>
