<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
</head>

<body>

<h2>Admin Panel</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add</button>

<h3>Products</h3>
<div id="products"></div>

<h3>Orders</h3>
<div id="orders"></div>

<script src="firebase.js"></script>
<script>

// ADD PRODUCT
function addProduct(){

let n=name.value;
let p=price.value;
let i=image.value;

fetch(BASE_URL+"/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:n},
price:{integerValue:parseInt(p)},
image:{stringValue:i}
}
})
})
.then(()=>loadProducts());
}

// LOAD PRODUCTS
async function loadProducts(){

let res = await fetch(BASE_URL+"/products");
let data = await res.json();

let div = document.getElementById("products");
div.innerHTML="";

data.documents?.forEach(d=>{
let f=d.fields;

div.innerHTML+=`${f.name.stringValue} - ${f.price.integerValue}<br>`;
});
}

// LOAD ORDERS
async function loadOrders(){

let res = await fetch(BASE_URL+"/orders");
let data = await res.json();

let div = document.getElementById("orders");
div.innerHTML="";

data.documents?.forEach(d=>{
let f=d.fields;

div.innerHTML+=`
TX:${f.txid.stringValue}
Status:${f.status.stringValue}<br>
`;
});
}

loadProducts();
loadOrders();

</script>

</body>
</html>
