<!DOCTYPE html>
<html>

<head>
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.box{
background:white;
padding:20px;
width:420px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
background:#ff6f00;
color:white;
border:none;
cursor:pointer;
}

.product{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<input id="img" placeholder="Image URL">
<input type="file" id="file">

<select id="category">
<option value="groceries">Groceries</option>
<option value="makeup">Makeup</option>
<option value="clothing">Clothing</option>
</select>

<button onclick="addProduct()">Add Product</button>

<h3>All Products</h3>
<div id="list"></div>

</div>

<script>

function getProducts(){
return JSON.parse(localStorage.getItem("products")) || [];
}

function saveProducts(data){
localStorage.setItem("products", JSON.stringify(data));
}

function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let imgInput = document.getElementById("img").value;
let file = document.getElementById("file").files[0];
let category = document.getElementById("category").value;

if(file){
let reader = new FileReader();
reader.onload = function(e){
save(name,price,e.target.result,category);
}
reader.readAsDataURL(file);
}else{
save(name,price,imgInput,category);
}

}

function save(name,price,img,category){

let products = getProducts();

products.push({
name,
price:Number(price),
img,
category
});

saveProducts(products);

alert("Added!");
render();

}

function deleteProduct(index){
let products = getProducts();
products.splice(index,1);
saveProducts(products);
render();
}

function render(){

let list = document.getElementById("list");
list.innerHTML = "";

let products = getProducts();

products.forEach((p,i)=>{

list.innerHTML += `
<div class="product">
<img src="${p.img}" width="50">
<p>${p.name} - ${p.price}</p>
<button onclick="deleteProduct(${i})">Delete</button>
</div>
`;

});

}

render();

</script>

</body>
</html>
