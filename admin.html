<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{font-family:Arial;background:#f0f9ff;margin:0;}
.header{background:#38bdf8;color:white;padding:15px;text-align:center;}

.tab{display:flex;}
.tab div{flex:1;padding:10px;text-align:center;background:#ddd;cursor:pointer;}
.tab .active{background:#38bdf8;color:white;}

.section{display:none;padding:10px;}
.section.active{display:block;}

.card{background:white;padding:10px;margin:10px 0;}

input{width:100%;padding:8px;margin:5px 0;}
button{background:#38bdf8;color:white;border:none;padding:8px;width:100%;}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div class="tab">
<div class="active" onclick="show('p',this)">Products</div>
<div onclick="show('o',this)">Orders</div>
</div>

<div id="p" class="section active">

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="add()">Add Product</button>

<div id="plist"></div>

</div>

<div id="o" class="section">
<div id="olist"></div>
</div>

<script>

function show(id,e){
document.querySelectorAll(".tab div").forEach(x=>x.classList.remove("active"));
e.classList.add("active");

document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ADD
function add(){
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:name.value},
price:{integerValue:price.value},
image:{stringValue:image.value}
}
})
}).then(()=>loadP());
}

// LOAD PRODUCTS
async function loadP(){
let res=await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products");
let data=await res.json();

let div=document.getElementById("plist");
div.innerHTML="";

if(!data.documents){div.innerHTML="No products";return;}

data.documents.forEach(d=>{
let id=d.name.split("/").pop();
let f=d.fields;

div.innerHTML+=`
<div class="card">
${f.name.stringValue} - ${f.price.integerValue}
<button onclick="del('${id}')">Delete</button>
</div>
`;
});
}

// DELETE
function del(id){
fetch(`https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products/${id}`,{
method:"DELETE"
}).then(()=>loadP());
}

// LOAD ORDERS
async function loadO(){
let res=await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders");
let data=await res.json();

let div=document.getElementById("olist");
div.innerHTML="";

if(!data.documents){div.innerHTML="No orders";return;}

data.documents.forEach(d=>{
let id=d.name.split("/").pop();
let f=d.fields;

div.innerHTML+=`
<div class="card">
TX: ${f.txid.stringValue}<br>
Amount: ${f.amount.integerValue}<br>
Status: ${f.status.stringValue}

<button onclick="approve('${id}')">Approve</button>
</div>
`;
});
}

// APPROVE
function approve(id){
fetch(`https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders/${id}?updateMask.fieldPaths=status`,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{status:{stringValue:"approved"}}
})
}).then(()=>loadO());
}

loadP();
loadO();

</script>

</body>
</html>
