<!DOCTYPE html>
<html>
<body>

<h2>Admin</h2>

<input id="n" placeholder="Name">
<input id="p" placeholder="Price">
<input id="i" placeholder="Image URL">

<button onclick="add()">Add</button>

<h3>Products</h3>
<div id="pro"></div>

<h3>Orders</h3>
<div id="ord"></div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// ADD
function add(){
fetch(URL+"/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:n.value},
price:{integerValue:String(p.value)},
image:{stringValue:i.value}
}
})
}).then(loadPro);
}

// LOAD PRODUCTS
async function loadPro(){
let r=await fetch(URL+"/products");
let d=await r.json();

pro.innerHTML="";

d.documents?.forEach(x=>{
let id=x.name.split("/").pop();
let f=x.fields;

pro.innerHTML+=`
<div>
${f.name.stringValue} - ${f.price.integerValue}
<button onclick="del('${id}')">Delete</button>
</div>
`;
});
}

// DELETE
function del(id){
fetch(URL+"/products/"+id,{method:"DELETE"}).then(loadPro);
}

// LOAD ORDERS
async function loadOrd(){
let r=await fetch(URL+"/orders");
let d=await r.json();

ord.innerHTML="";

d.documents?.forEach(x=>{
let id=x.name.split("/").pop();
let f=x.fields;

ord.innerHTML+=`
<div>
TX: ${f.txid.stringValue}
Status: ${f.status.stringValue}
<button onclick="approve('${id}')">Approve</button>
</div>
`;
});
}

// APPROVE
function approve(id){
fetch(URL+"/orders/"+id,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{status:{stringValue:"approved"}}
})
}).then(loadOrd);
}

loadPro();
loadOrd();

</script>

</body>
</html>
