<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>

<body>

<h2>Orders</h2>
<div id="orders"></div>

<script>
async function loadOrders(){

let res = await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders");
let data = await res.json();

let div=document.getElementById("orders");
div.innerHTML="";

data.documents.forEach(d=>{

let id=d.name.split("/").pop();
let f=d.fields;

div.innerHTML+=`
<div style="border:1px solid #ccc;padding:10px;margin:10px">
<p>TX: ${f.txid.stringValue}</p>
<p>Amount: ${f.amount.integerValue}</p>
<p>Status: ${f.status.stringValue}</p>

<button onclick="approve('${id}')">Approve</button>
</div>
`;

});

}

function approve(id){

fetch(`https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders/${id}?updateMask.fieldPaths=status`,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
status:{stringValue:"approved"}
}
})
})
.then(()=>{
alert("Approved");
loadOrders();
});

}

loadOrders();
</script>

</body>
</html>
