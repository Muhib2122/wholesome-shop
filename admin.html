<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
</head>

<body>

<h2>Admin Panel</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add</button>

<h3>Products</h3>
<div id="products"></div>

<script>

const URL = "https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// ADD
function addProduct(){

let n=name.value;
let p=price.value;
let i=image.value;

fetch(URL+"/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:n},
price:{integerValue:String(p)},
image:{stringValue:i}
}
})
})
.then(()=>loadProducts());
}

// LOAD
async function loadProducts(){

let res = await fetch(URL+"/products");
let data = await res.json();

let div = document.getElementById("products");
div.innerHTML="";

data.documents?.forEach(d=>{

let id = d.name.split("/").pop();
let f=d.fields;

div.innerHTML+=`
<div>
<b>${f.name.stringValue}</b> - ${f.price.integerValue}
<button onclick="del('${id}')">Delete</button>
</div>
`;
});
}

// DELETE
function del(id){

fetch(URL+"/products/"+id,{
method:"DELETE"
})
.then(()=>loadProducts());
}

loadProducts();

</script>

</body>
</html>
