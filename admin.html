<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body { font-family:Arial; background:#f0f9ff; padding:10px; }

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

button {
  padding:6px;
  margin-top:5px;
  background:#38bdf8;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h2>🔥 Admin Orders</h2>

<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyXXXX",
  authDomain: "wholesome-shop-f4d0f.firebaseapp.com",
  projectId: "wholesome-shop-f4d0f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadOrders(){
  let data = await getDocs(collection(db,"orders"));
  let box = document.getElementById("orders");

  box.innerHTML="";

  data.forEach(d=>{
    let o = d.data();

    box.innerHTML += `
    <div class="card">
      <b>Total:</b> ${o.total} <br>
      <b>TXID:</b> ${o.txid} <br>
      <b>Status:</b> ${o.status} <br>

      <button onclick="approve('${d.id}')">Approve</button>
    </div>`;
  });
}

window.approve = async(id)=>{
  await updateDoc(doc(db,"orders",id),{
    status:"approved"
  });

  alert("Approved!");
  loadOrders();
}

loadOrders();
</script>

</body>
</html>
