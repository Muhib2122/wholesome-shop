<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{font-family:Arial;background:#f0f9ff;padding:10px}
table{width:100%;border-collapse:collapse}
th{background:#38bdf8;color:#fff}
td,th{padding:8px;border:1px solid #ccc;text-align:center}
.bkash{text-align:center;margin-top:20px}
button{width:100%;padding:10px;background:#38bdf8;color:#fff;border:none}
</style>
</head>

<body>

<h2>Checkout</h2>

<table>
<tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th></tr>
<tbody id="tbody"></tbody>
</table>

<h4 id="subtotal"></h4>
<h4 id="vat"></h4>
<h3 id="total"></h3>

<div class="bkash">
<img src="https://raw.githubusercontent.com/muhib2122/wholesome-shop/main/bkash.png" width="120">
<h3>bKash: 01764262579</h3>

<input id="txid" placeholder="TX ID">
<button onclick="confirmOrder()">Confirm</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let subtotal=0;

cart.forEach(i=>{
let t=i.price*i.qty;
subtotal+=t;
tbody.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.price}</td>
<td>${i.qty}</td>
<td>${t}</td>
</tr>
`;
});

let vat=subtotal*0.04;
let total=subtotal+vat;

subtotalEl.innerText="Subtotal: "+subtotal;
vatEl.innerText="VAT: "+vat.toFixed(2);
totalEl.innerText="Total: "+total.toFixed(2);

function confirmOrder(){

let tx=document.getElementById("txid").value;

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx},
amount:{integerValue:total},
status:{stringValue:"pending"}
}
})
})
.then(()=>{
alert("Order Submitted");
localStorage.removeItem("cart");
});

}
</script>

</body>
</html>
