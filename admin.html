<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{background:#0ea5e9;color:white;padding:10px;}
.container{padding:15px;}
.card{background:white;padding:10px;margin-bottom:10px;border-radius:10px;}
button{margin:5px;}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div class="container" id="orders"></div>

<script>
const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

fetch(URL+"/orders")
.then(r=>r.json())
.then(d=>{
let docs=d.documents||[];

docs.forEach(doc=>{
let f=doc.fields;
let name=doc.name;

orders.innerHTML+=`
<div class="card">
<div>👤 ${f.email.stringValue}</div>
<div>💰 ${f.amount.integerValue} BDT</div>
<div>TX: ${f.txid.stringValue}</div>
<div>Status: ${f.status.stringValue}</div>

<button onclick="update('${name}','approved')">✅</button>
<button onclick="update('${name}','declined')">❌</button>
</div>
`;
});
});

function update(name,status){

fetch("https://firestore.googleapis.com/v1/"+name+"?updateMask.fieldPaths=status",{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
status:{stringValue:status}
}
})
}).then(()=>location.reload());

}
</script>

</body>
</html>
