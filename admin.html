<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{background:#0ea5e9;color:white;padding:10px;display:flex;justify-content:space-between;}
.container{padding:15px;}

.topbox{display:flex;gap:10px;margin-bottom:10px;}
.topbox div{flex:1;background:white;padding:10px;border-radius:10px;text-align:center;}

.card{background:white;padding:10px;margin-bottom:10px;border-radius:10px;}
button{margin:3px;padding:6px 10px;border:none;border-radius:6px;}
.approve{background:#16a34a;color:white;}
.decline{background:#dc2626;color:white;}
.delete{background:black;color:white;}
.edit{background:orange;color:white;}

input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
.section{margin-top:15px;}
</style>
</head>

<body>

<div class="header">
<b>Admin Panel</b>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="topbox">
<div>💰 <span id="sales">0</span></div>
<div>📦 <span id="ordersCount">0</span></div>
<div>⏳ <span id="pending">0</span></div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h3>Products</h3>

<div class="card">
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add</button>
</div>

<div id="products"></div>
</div>

<!-- ORDERS -->
<div class="section">
<h3>Orders</h3>
<div id="orders"></div>
</div>

</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// 🔐 CHECK
if(localStorage.getItem("admin")!=="true"){
alert("Admin only");
location.href="auth.html";
}

// LOGOUT
function logout(){
localStorage.removeItem("admin");
location.href="auth.html";
}

// ================= PRODUCTS =================

function loadProducts(){
fetch(URL+"/products")
.then(r=>r.json())
.then(d=>{
products.innerHTML="";

(d.documents||[]).forEach(doc=>{
let f=doc.fields;

products.innerHTML+=`
<div class="card">
<img src="${f.image?.stringValue}" width="60"><br>
${f.name?.stringValue} - ${f.price?.integerValue} BDT<br>

<button class="delete" onclick="deleteProduct('${doc.name}')">Delete</button>
</div>
`;
});
});
}

function addProduct(){
fetch(URL+"/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
name:{stringValue:pname.value},
price:{integerValue:pprice.value},
image:{stringValue:pimg.value}
}
})
}).then(()=>location.reload());
}

function deleteProduct(doc){
fetch("https://firestore.googleapis.com/v1/"+doc,{method:"DELETE"})
.then(()=>location.reload());
}

// ================= ORDERS =================

function loadOrders(){

fetch(URL+"/orders")
.then(r=>r.json())
.then(d=>{

orders.innerHTML="";

let docs = d.documents || [];

let total=0;
let pendingCount=0;

docs.forEach(doc=>{

let f = doc.fields || {};

// 🔥 SAFE PARSE
let email = f.email?.stringValue || f.user?.stringValue || "N/A";

let amount = 0;
if(f.amount?.integerValue){
amount = parseInt(f.amount.integerValue);
}else if(f.amount?.stringValue){
amount = parseInt(f.amount.stringValue);
}

let status = f.status?.stringValue || "pending";
let tx = f.txid?.stringValue || "-";

// 🔥 COUNT FIX
if(status==="approved") total += amount;
if(status==="pending") pendingCount++;

// UI
orders.innerHTML+=`
<div class="card">
👤 ${email}<br>
💰 ${amount} BDT<br>
TX: ${tx}<br>
Status: ${status}<br>

<button class="approve" onclick="update('${doc.name}','approved')">✅</button>
<button class="decline" onclick="update('${doc.name}','declined')">❌</button>
</div>
`;

});

// 🔥 DASHBOARD FIX
sales.innerText = total;
ordersCount.innerText = docs.length;
pending.innerText = pendingCount;

});

}

// UPDATE STATUS
function update(doc,status){
fetch("https://firestore.googleapis.com/v1/"+doc+"?updateMask.fieldPaths=status",{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{status:{stringValue:status}}
})
}).then(()=>location.reload());
}

// INIT
loadProducts();
loadOrders();

</script>

</body>
</html>
