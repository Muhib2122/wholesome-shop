<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;padding:15px;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #999;
padding:8px;
text-align:left;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<img src="myshop.jpg" width="60"><br><br>

<h2>Checkout</h2>

<h3>Pay with bKash</h3>
<img src="bkash.png" width="150"><br>
<b>01764262579</b>

<table id="table">
<tr>
<th>Name</th>
<th>Qty</th>
<th>Total</th>
</tr>
</table>

<input id="tx" placeholder="Enter TX ID"><br>
<button onclick="order()">Confirm Order</button>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// 🔥 GET CART
let raw = JSON.parse(localStorage.getItem("cart")||"[]");

// 🔥 GROUP WITH QTY (FIX)
let cart = [];

raw.forEach(item=>{

let price = parseInt(item.price) || 0;

let existing = cart.find(i=>i.name===item.name);

if(existing){
existing.qty++;
}else{
cart.push({
name:item.name,
price:price,
qty:1
});
}

});

let subtotal=0;

// 🔥 TABLE RENDER (FIXED)
cart.forEach(item=>{

let total = item.price * item.qty;
subtotal += total;

table.innerHTML += `
<tr>
<td>${item.name}</td>
<td>${item.qty}</td>
<td>${total} BDT</td>
</tr>
`;

});

// 🔥 CALCULATION SAFE
let vat = Math.round(subtotal * 0.04);
let grand = subtotal + vat;

table.innerHTML += `
<tr>
<td colspan="2">Subtotal</td>
<td>${subtotal} BDT</td>
</tr>
<tr>
<td colspan="2">VAT (4%)</td>
<td>${vat} BDT</td>
</tr>
<tr>
<td colspan="2"><b>Total</b></td>
<td><b>${grand} BDT</b></td>
</tr>
`;

// 🔥 ORDER FUNCTION (UNCHANGED LOGIC)
function order(){

let txid = tx.value;

if(!txid){
alert("Enter TX ID");
return;
}

// 🔥 ORDER ID GENERATE
let orderId = "ORD-"+Date.now();

fetch(URL+"/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
amount:{integerValue:grand},
txid:{stringValue:txid},
status:{stringValue:"pending"},
statusStep:{stringValue:"Pending"},
orderId:{stringValue:orderId}
}
})
}).then(()=>{

localStorage.removeItem("cart");

alert("Order placed! ID: "+orderId);

location.href="myorders.html";

});

}

</script>

</body>
</html>
