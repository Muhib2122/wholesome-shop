<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body { font-family: Arial; background:#e6f3ff; margin:0; padding:10px; }

table { width:100%; border-collapse: collapse; font-size:14px; }
th { background:#4da6ff; color:white; }
td,th { padding:6px; text-align:center; border:1px solid #ccc; }

.summary { margin-top:10px; }

button {
  background:#4da6ff;
  color:white;
  padding:10px;
  border:none;
  width:100%;
}
</style>
</head>

<body>

<h3>Checkout</h3>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="summary">
  <p id="subtotal"></p>
  <p id="vat"></p>
  <h3 id="total"></h3>
</div>

<input id="txid" placeholder="TX ID" style="width:100%;padding:8px;">
<br><br>
<button onclick="confirmOrder()">Confirm</button>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];

let subtotal=0;
let tbody=document.getElementById("tbody");

cart.forEach(i=>{
  let qty=i.qty||1;
  let t=i.price*qty;
  subtotal+=t;

  tbody.innerHTML+=`
  <tr>
    <td>${i.name}</td>
    <td>${i.price}</td>
    <td>${qty}</td>
    <td>${t}</td>
  </tr>`;
});

let vat=subtotal*0.04;
let total=subtotal+vat;

document.getElementById("subtotal").innerText="Subtotal: "+subtotal;
document.getElementById("vat").innerText="VAT: "+vat.toFixed(2);
document.getElementById("total").innerText="Total: "+total.toFixed(2);

function confirmOrder(){
  let tx=document.getElementById("txid").value;
  if(!tx) return alert("Enter TXID");

  alert("Order Confirmed ✅");
  localStorage.removeItem("cart");
}
</script>

</body>
</html>
