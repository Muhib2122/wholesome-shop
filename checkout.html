<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body { font-family:Arial; background:#f5f5f5; padding:10px; }

table { width:100%; border-collapse: collapse; }
th { background:#ff6a00; color:white; }
td,th { padding:6px; border:1px solid #ccc; text-align:center; }

.bkash {
  background:#e2136e;
  color:white;
  padding:10px;
  border-radius:8px;
  margin-top:15px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ff6a00;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h3>Checkout</h3>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h4 id="subtotal"></h4>
<h4 id="vat"></h4>
<h3 id="total"></h3>

<!-- 🔥 bKash UI -->
<div class="bkash">
  Send Money to: <b>01XXXXXXXXX</b><br>
  Then enter TX ID below
</div>

<input id="txid" placeholder="Enter TX ID" style="width:100%;padding:8px;">

<button onclick="confirmOrder()">Confirm Order</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];

let subtotal=0;
let tbody=document.getElementById("tbody");

cart.forEach(i=>{
  let qty=i.qty||1;
  let t=i.price*qty;
  subtotal+=t;

  tbody.innerHTML+=`
  <tr>
    <td>${i.name}</td>
    <td>${i.price}</td>
    <td>${qty}</td>
    <td>${t}</td>
  </tr>`;
});

let vat=subtotal*0.04;
let total=subtotal+vat;

document.getElementById("subtotal").innerText="Subtotal: "+subtotal;
document.getElementById("vat").innerText="VAT (4%): "+vat.toFixed(2);
document.getElementById("total").innerText="Total: "+total.toFixed(2);

// 🔥 Premium Invoice
function confirmOrder(){
  let tx=document.getElementById("txid").value;
  if(!tx) return alert("TX ID lagbe!");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=20;
  doc.setFontSize(16);
  doc.text("Wholesome Shop Invoice", 50, y);

  y+=10;
  doc.setFontSize(12);

  cart.forEach(i=>{
    doc.text(`${i.name} x${i.qty}`,10,y);
    y+=8;
  });

  y+=5;
  doc.text("Subtotal: "+subtotal,10,y); y+=8;
  doc.text("VAT: "+vat.toFixed(2),10,y); y+=8;
  doc.text("Total: "+total.toFixed(2),10,y); y+=8;
  doc.text("TXID: "+tx,10,y);

  doc.save("invoice.pdf");

  localStorage.removeItem("cart");
}
</script>

</body>
</html>
