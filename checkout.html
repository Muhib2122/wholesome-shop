<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body {
  font-family: Arial;
  background: #f0f9ff;
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #38bdf8;
  color: white;
}

td, th {
  padding: 8px;
  border: 1px solid #ccc;
  text-align: center;
}

.bkash-box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
  text-align: center;
}

.bkash-box img {
  width: 120px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #38bdf8;
  color: white;
  border: none;
}
</style>
</head>

<body>

<h2>Checkout</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h4 id="subtotal"></h4>
<h4 id="vat"></h4>
<h3 id="total"></h3>

<!-- 🔥 BKASH -->
<div class="bkash-box">

<img src="https://raw.githubusercontent.com/muhib2122/wholesome-shop/main/bkash.png">

<h3>bKash Send Money</h3>
<p><b>01764262579</b></p>

<input id="txid" placeholder="Enter TX ID">
<button onclick="confirmOrder()">Confirm Order</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let tbody = document.getElementById("tbody");

let subtotal = 0;

cart.forEach(item => {

let total = item.price * item.qty;
subtotal += total;

tbody.innerHTML += `
<tr>
<td>${item.name}</td>
<td>${item.price}</td>
<td>${item.qty}</td>
<td>${total}</td>
</tr>
`;

});

let vat = subtotal * 0.04;
let final = subtotal + vat;

document.getElementById("subtotal").innerText = "Subtotal: " + subtotal;
document.getElementById("vat").innerText = "VAT (4%): " + vat.toFixed(2);
document.getElementById("total").innerText = "Total: " + final.toFixed(2);

function confirmOrder(){

let tx = document.getElementById("txid").value;

if(!tx){
alert("Enter TX ID");
return;
}

// 🔥 Firebase save
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
fields: {
txid: { stringValue: tx },
amount: { integerValue: final },
status: { stringValue: "pending" }
}
})
})
.then(()=>{

alert("Order Submitted ✅");

localStorage.removeItem("cart");
location.reload();

});

}

</script>

</body>
</html>
