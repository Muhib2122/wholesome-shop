<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{background:#0ea5e9;color:white;padding:10px;display:flex;align-items:center;gap:10px;}
.header img{width:35px;height:35px;border-radius:50%;}
.container{padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;}
.total{font-weight:bold;}
.bkash{text-align:center;}
.bkash img{width:120px;}
input{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:12px;background:#16a34a;color:white;border:none;border-radius:8px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">
<img src="myshop.jpg">
Checkout
</div>

<div class="container">

<div class="card" id="cartBox"></div>

<div class="card bkash">
<h3>💳 Pay with bKash</h3>
<img src="bkash.png">
<p>📱 <b style="color:#e2136e;">01764262579</b></p>

<input id="tx" placeholder="Enter TX ID">
<button onclick="confirmOrder()">Confirm Order</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let cart = JSON.parse(localStorage.getItem("cart") || "[]");

// CART UI
function renderCart(){
cartBox.innerHTML="";
let total=0;

cart.forEach(p=>{
total += p.price * p.qty;

cartBox.innerHTML += `
<div class="row">
<div>${p.name} x${p.qty}</div>
<div>${p.price*p.qty} BDT</div>
</div>`;
});

let vat = Math.floor(total*0.05);
let final = total + vat;

cartBox.innerHTML += `
<hr>
<div class="row total"><div>Subtotal</div><div>${total}</div></div>
<div class="row total"><div>VAT</div><div>${vat}</div></div>
<div class="row total"><div>Total</div><div>${final}</div></div>`;
}

// ORDER SAVE (logic untouched)
function confirmOrder(){

let user = localStorage.getItem("user");
if(!user){ alert("Login first"); return; }

let tx = document.getElementById("tx").value;
if(!tx){ alert("Enter TX ID"); return; }

let total = cart.reduce((a,b)=>a+(b.price*b.qty),0);
let vat = Math.floor(total*0.05);
let final = total + vat;

// 🔥 backup cart for PDF
localStorage.setItem("cart_backup", JSON.stringify(cart));

// 🔥 SAVE ORDER (same logic)
fetch(URL+"/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
email:{stringValue:user},
txid:{stringValue:tx},
amount:{integerValue:String(final)},
status:{stringValue:"pending"}
}
})
})
.then(()=>{

// 🔥 PDF
downloadPDF(final, tx, "pending");

// 🔥 WhatsApp notify
let msg = `🛒 New Order!
User: ${user}
Amount: ${final} BDT
TX: ${tx}`;

let url = "https://wa.me/8801764262579?text=" + encodeURIComponent(msg);
window.open(url, "_blank");

localStorage.removeItem("cart");

alert("Order placed ✅");
location.href="myorders.html";

});
}

// 🔥 PRO PDF
function downloadPDF(amount, tx, status){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let img = new Image();
img.src = "myshop.jpg";

img.onload = function(){

doc.addImage(img,'JPEG',10,8,25,25);

doc.setFontSize(18);
doc.text("MyShop Invoice", 50, 20);

doc.setFontSize(10);
doc.text("Date: "+new Date().toLocaleString(),50,28);

doc.line(10,35,200,35);

// header
doc.text("Item",15,45);
doc.text("Qty",100,45);
doc.text("Price",140,45);

doc.line(10,48,200,48);

// items
let cart = JSON.parse(localStorage.getItem("cart_backup")||"[]");
let y=55;

cart.forEach(p=>{
doc.text(p.name,15,y);
doc.text(String(p.qty),100,y);
doc.text((p.price*p.qty)+" BDT",140,y);
y+=10;
});

doc.line(10,y,200,y);
y+=10;

doc.text("Total: "+amount+" BDT",140,y);
y+=10;
doc.text("TX: "+tx,15,y);
y+=10;
doc.text("Status: "+status,15,y);

doc.save("invoice.pdf");

}
}

renderCart();

</script>
</body>
</html>
