<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body style="font-family:sans-serif;background:#e0f2fe;padding:20px;">

<h2>Checkout</h2>

<input id="tx" placeholder="Enter TX ID"><br><br>

<button onclick="place()">Confirm Order</button>

<script>

function place(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;

cart.forEach(i=> total+=i.price*i.qty);

let vat=total*0.04;
let final=total+vat;

// SAVE ORDER (unchanged logic)
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx.value},
amount:{integerValue:String(final)},
status:{stringValue:"pending"}
}
})
}).then(()=>{

generatePDF(cart,total,vat,final);

localStorage.removeItem("cart");
location.href="index.html";

});

}

// PDF
function generatePDF(cart,total,vat,final){

const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("Wholesome Shop",20,20);

let y=40;

cart.forEach(i=>{
doc.text(`${i.name} x${i.qty} = ${i.price*i.qty}`,20,y);
y+=10;
});

doc.text("Subtotal: "+total,20,y+10);
doc.text("VAT (4%): "+vat,20,y+20);
doc.text("Total: "+final,20,y+30);

doc.save("invoice.pdf");
}

</script>

</body>
</html>
