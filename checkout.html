<!DOCTYPE html>
<html>
<body>

<h2>Checkout</h2>

<div id="list"></div>

<img src="https://muhib2122.github.io/wholesome-shop/bkash.png" width="120">
<p>bKash: 01764262579</p>

<input id="tx" placeholder="TX ID">
<button onclick="done()">Confirm</button>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
list.innerHTML+=`${i.name} x ${i.qty}<br>`;
});

let vat=total*0.04;
let grand=total+vat;

list.innerHTML+=`<br>VAT: ${vat}<br>Total: ${grand}`;

function done(){

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx.value},
amount:{integerValue:String(grand)},
status:{stringValue:"pending"}
}
})
}).then(()=>{
alert("Done ✅");
localStorage.removeItem("cart");
location="index.html";
});

}

</script>

</body>
</html>
