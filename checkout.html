<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.header img{
width:35px;
border-radius:50%;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

.total{
background:#0ea5e9;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}

button{
background:#0ea5e9;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
margin-top:10px;
font-weight:bold;
}

.bkashBox{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.bkashBox img{
width:50px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="myshop.jpg">
<b>Checkout</b>
</div>

<!-- ORDER -->
<div class="card">

<h3>Order Summary</h3>

<table id="tbl">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</table>

<div class="total" id="grandTotal">Total: 0</div>

</div>

<!-- BKASH -->
<div class="card">

<div class="bkashBox">
<img src="bkash.png"> <!-- 👉 এইটা GitHub এ upload করতে হবে -->
<h3>bKash Send Money</h3>
</div>

<p><b>01764262579</b></p>

<input id="tx" placeholder="Enter TX ID">

<button onclick="placeOrder()">Confirm Order</button>

</div>

<script>

// LOAD CART
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;
let html="";

cart.forEach(item=>{
let t=item.price*item.qty;
total+=t;

html+=`
<tr>
<td>${item.name}</td>
<td>${item.price}</td>
<td>${item.qty}</td>
<td>${t}</td>
</tr>
`;
});

document.getElementById("tbl").innerHTML+=html;
document.getElementById("grandTotal").innerText="Total: "+total+" BDT";

// PDF
function generatePDF(tx){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.addImage("myshop.jpg","JPEG",10,10,20,20);

doc.setFontSize(16);
doc.text("MyShop Invoice", 40, 20);

doc.setFontSize(10);
doc.text("TX ID: "+tx, 10, 40);
doc.text("Date: "+new Date().toLocaleString(), 10, 48);

let y=60;

cart.forEach(item=>{
doc.text(`${item.name} | ${item.price} x ${item.qty} = ${item.price*item.qty}`,10,y);
y+=8;
});

doc.text("Total: "+total+" BDT",10,y+10);

doc.save("invoice.pdf");
}

// PLACE ORDER
function placeOrder(){

let tx=document.getElementById("tx").value;

if(!tx){
alert("Enter TX ID");
return;
}

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx},
amount:{integerValue:String(total)},
status:{stringValue:"pending"}
}
})
})
.then(()=>{

generatePDF(tx);

alert("Order placed + Invoice downloaded ✅");

localStorage.removeItem("cart");
location.href="index.html";

});

}

</script>

</body>
</html>
