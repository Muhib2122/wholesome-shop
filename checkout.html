<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
</head>

<body>

<h2>Checkout</h2>

<div id="list"></div>

<img src="https://muhib2122.github.io/wholesome-shop/bkash.png" width="120">
<p>bKash: 01764262579</p>

<input id="tx" placeholder="TX ID">
<button onclick="confirmOrder()">Confirm</button>

<script src="firebase.js"></script>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let div = document.getElementById("list");

let total=0;

cart.forEach(i=>{
total += i.price*i.qty;
div.innerHTML += `${i.name} - ${i.qty}<br>`;
});

function confirmOrder(){

let tx = document.getElementById("tx").value;

fetch(BASE_URL+"/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx},
amount:{integerValue:total},
status:{stringValue:"pending"}
}
})
})
.then(()=>{

alert("Done ✅");

localStorage.removeItem("cart");

location.href="index.html";
});
}

</script>

</body>
</html>
