<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body style="font-family:sans-serif;background:#e0f2fe;padding:15px;">

<img src="myshop.jpg" width="40">
<h2>Checkout</h2>

<h3>Pay with bKash</h3>
<img src="bkash.png" width="120"><br>
<b>01764262579</b><br><br>

<table border="1" width="100%" id="table"></table>
<br>

<input id="tx" placeholder="Enter TX ID"><br><br>

<button onclick="place()">Confirm Order</button>

<script>

// ===== EXISTING LOGIC =====
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let html="<tr><th>Name</th><th>Qty</th><th>Total</th></tr>";
let total=0;

cart.forEach(i=>{
let t=i.price*i.qty;
total+=t;
html+=`<tr><td>${i.name}</td><td>${i.qty}</td><td>${t}</td></tr>`;
});

// VAT
let vat = Math.round(total * 0.04);
let finalTotal = total + vat;

// TABLE
html+=`<tr><td colspan="2">Subtotal</td><td>${total}</td></tr>`;
html+=`<tr><td colspan="2">VAT (4%)</td><td>${vat}</td></tr>`;
html+=`<tr><td colspan="2"><b>Total</b></td><td><b>${finalTotal}</b></td></tr>`;

table.innerHTML=html;


// ===== ORDER SAVE (UNCHANGED) =====
function place(){

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx.value},
amount:{integerValue:String(finalTotal)},
status:{stringValue:"pending"},
email:{stringValue:localStorage.getItem("user")||"N/A"}
}
})
}).then(()=>{
generatePDF(); // 🔥 new premium pdf
localStorage.removeItem("cart");
location.href="myorders.html";
});
}


// ===== 🔥 PREMIUM PDF =====
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

// HEADER BOX
doc.setFillColor(14,165,233);
doc.rect(0,0,210,25,"F");

doc.setTextColor(255,255,255);
doc.setFontSize(16);
doc.text("Wholesome Shop", 15,15);

// LOGO (small)
doc.addImage("myshop.jpg", "JPEG", 160,5,15,15);

// RESET COLOR
doc.setTextColor(0,0,0);

// INVOICE TITLE
doc.setFontSize(14);
doc.text("Invoice", 15,35);

// DATE
let date = new Date().toLocaleString();
doc.setFontSize(10);
doc.text("Date: "+date, 15,42);

// TABLE HEADER
let y = 55;
doc.setFillColor(220,220,220);
doc.rect(15,y,180,8,"F");

doc.text("Product", 20,y+5);
doc.text("Qty", 110,y+5);
doc.text("Total", 150,y+5);

// ITEMS
y+=10;

cart.forEach(i=>{
doc.text(i.name,20,y);
doc.text(String(i.qty),110,y);
doc.text(String(i.price*i.qty)+" BDT",150,y);
y+=8;
});

// LINE
doc.line(15,y,195,y);
y+=8;

// SUBTOTAL
doc.text("Subtotal: "+total+" BDT",140,y);
y+=8;

// VAT
doc.text("VAT (4%): "+vat+" BDT",140,y);
y+=8;

// FINAL
doc.setFontSize(12);
doc.text("Total: "+finalTotal+" BDT",140,y);

// FOOTER
doc.setFontSize(10);
doc.text("Thank you for shopping ❤️",15,280);

// SAVE AUTO DOWNLOAD
doc.save("invoice.pdf");

}

</script>

</body>
</html>
