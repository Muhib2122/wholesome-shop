<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{font-family:Arial;background:#f0f9ff;padding:10px;}
table{width:100%;background:white;border-collapse:collapse;}
th,td{padding:8px;border:1px solid #ddd;text-align:center;}
button{background:#38bdf8;color:white;border:none;padding:10px;width:100%;}
</style>
</head>

<body>

<h2>Checkout</h2>

<table id="table">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</table>

<h3 id="total"></h3>

<div style="text-align:center;margin:20px;">
<img src="bkash.jpg" width="120"><br>
bKash: 01764262579
</div>

<input id="tx" placeholder="Enter TX ID" style="width:100%;padding:8px;">

<button onclick="confirmOrder()">Confirm</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let table = document.getElementById("table");
let total=0;

cart.forEach(i=>{
let t=i.price*i.qty;
total+=t;

table.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.price}</td>
<td>${i.qty}</td>
<td>${t}</td>
</tr>
`;
});

document.getElementById("total").innerText="Total: "+total;

function confirmOrder(){

let tx = document.getElementById("tx").value;

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx},
amount:{integerValue:total},
status:{stringValue:"pending"}
}
})
}).then(()=>{
alert("Order Done ✅");
localStorage.removeItem("cart");
location.href="index.html";
});

}

</script>

</body>
</html>
