<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body { font-family:Arial; background:#f0f9ff; padding:10px; }

table { width:100%; border-collapse: collapse; }
th { background:#38bdf8; color:white; }
td,th { padding:6px; border:1px solid #ccc; text-align:center; }

.bkash {
  background:white;
  border-radius:10px;
  padding:15px;
  margin-top:15px;
  text-align:center;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#38bdf8;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h3>Checkout</h3>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<h4 id="subtotal"></h4>
<h4 id="vat"></h4>
<h3 id="total"></h3>

<!-- 🔥 BKASH -->
<div class="bkash">
  <img src="https://i.ibb.co/7W0KX3P/bkash.png" width="120"><br><br>
  <b>bKash Send Money</b><br>
  01764262579
</div>

<input id="txid" placeholder="Enter TX ID" style="width:100%;padding:10px;">

<button onclick="confirmOrder()">Confirm Order</button>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyXXXX",
  authDomain: "wholesome-shop-f4d0f.firebaseapp.com",
  projectId: "wholesome-shop-f4d0f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let subtotal = 0;
let tbody = document.getElementById("tbody");

cart.forEach(i=>{
  let t = i.price * i.qty;
  subtotal += t;

  tbody.innerHTML += `
  <tr>
    <td>${i.name}</td>
    <td>${i.price}</td>
    <td>${i.qty}</td>
    <td>${t}</td>
  </tr>`;
});

let vat = subtotal * 0.04;
let total = subtotal + vat;

document.getElementById("subtotal").innerText = "Subtotal: " + subtotal;
document.getElementById("vat").innerText = "VAT (4%): " + vat.toFixed(2);
document.getElementById("total").innerText = "Total: " + total.toFixed(2);

// 🔥 SAVE ORDER
window.confirmOrder = async () => {
  let tx = document.getElementById("txid").value;
  if(!tx) return alert("TX ID lagbe!");

  await addDoc(collection(db,"orders"),{
    cart,
    total,
    txid: tx,
    status: "pending",
    time: new Date()
  });

  alert("Order submitted! Waiting for admin approval.");

  localStorage.removeItem("cart");
  window.location.href="index.html";
};
</script>

</body>
</html>
