<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{
background:#0ea5e9;color:white;padding:10px;
display:flex;align-items:center;gap:10px;
}
.header img{width:35px;height:35px;border-radius:50%;}
.container{padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;}
.total{font-size:18px;font-weight:bold;}
.confirm{width:100%;padding:12px;background:#16a34a;color:white;border:none;border-radius:8px;}
.bkash{text-align:center;}
.bkash img{width:120px;}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<b>Checkout</b>
</div>

<div class="container">

<div class="card" id="cartBox"></div>

<div class="card bkash">
<h3>Pay with bKash</h3>

<img src="bkash.jpg">

<p style="font-size:16px;">
📱 <b>bKash:</b> 
<span style="color:#e2136e;font-weight:bold;">01764262579</span>
</p>

<input id="tx" placeholder="Enter TX ID">

<button class="confirm" onclick="confirmOrder()">Confirm Order</button>
</div>

</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

function renderCart(){
cartBox.innerHTML="";
let total=0;

cart.forEach(p=>{
total+=p.price*p.qty;
cartBox.innerHTML+=`<div>${p.name} x${p.qty}</div>`;
});

let vat=Math.floor(total*0.05);
let final=total+vat;

cartBox.innerHTML+=`<hr>Total: ${final} BDT`;
}

function confirmOrder(){

let user=localStorage.getItem("user");
let tx=document.getElementById("tx").value;

let total = cart.reduce((a,b)=>a+(b.price*b.qty),0);
let vat=Math.floor(total*0.05);
let final=total+vat;

fetch(URL+"/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
email:{stringValue:user},
txid:{stringValue:tx},
amount:{integerValue:String(final)},
status:{stringValue:"pending"}
}
})
}).then(()=>{
generateInvoice(tx,final);
localStorage.removeItem("cart");
location.href="myorders.html";
});
}

// invoice
function generateInvoice(tx,total){
let w=window.open("");
w.document.write(`
<img src="logo.png" width="80"><h2>Invoice</h2>
User: ${localStorage.getItem("user")}<br>
TX: ${tx}<br>
Total: ${total} BDT
`);
w.print();
}

renderCart();

</script>

</body>
</html>
