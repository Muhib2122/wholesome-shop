<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout</title>

<style>
body{
font-family:sans-serif;
margin:0;
background:#e0f2fe;
}

.header{
background:#0ea5e9;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:15px;
width:100%;
padding:12px;
background:#0ea5e9;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}
</style>
</head>

<body>

<div class="header">Checkout</div>

<div class="container">

<div class="card">
<h3>Total Amount: <span id="total">0</span> BDT</h3>

<input id="tx" placeholder="Enter TX ID">

<button onclick="confirmOrder()">Confirm Order</button>

</div>

</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// LOAD TOTAL
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

let total = cart.reduce((a,b)=>a+(b.price*b.qty),0);
document.getElementById("total").innerText=total;


// 🔥 ORDER SAVE FIX
function confirmOrder(){

let user = localStorage.getItem("user");

if(!user){
alert("Login first");
location.href="auth.html";
return;
}

let tx = document.getElementById("tx").value;

if(!tx){
alert("Enter TX ID");
return;
}

fetch(URL+"/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
email:{stringValue:user},   // ✅ IMPORTANT FIX
txid:{stringValue:tx},
amount:{integerValue:String(total)},
status:{stringValue:"pending"}
}
})
})
.then(()=>{
alert("Order placed ✅");
localStorage.removeItem("cart");
location.href="myorders.html";
});

}

</script>

</body>
</html>
