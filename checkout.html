<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.header img{
width:35px;
border-radius:50%;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

button{
background:#0ea5e9;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
margin-top:10px;
}

.total{
background:#0ea5e9;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<img src="myshop.jpg">
<b>Checkout</b>
</div>

<div class="card">

<h3>Order Summary</h3>

<table id="tbl">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</table>

<div class="total" id="grandTotal">Total: 0</div>

</div>

<div class="card">
<h3>bKash Send Money</h3>
<p><b>01764262579</b></p>

<input id="tx" placeholder="Enter TX ID" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;">

<button onclick="placeOrder()">Confirm Order</button>
</div>

<script>

// LOAD CART
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;
let html="";

cart.forEach(item=>{
let t=item.price*item.qty;
total+=t;

html+=`
<tr>
<td>${item.name}</td>
<td>${item.price}</td>
<td>${item.qty}</td>
<td>${t}</td>
</tr>
`;
});

document.getElementById("tbl").innerHTML+=html;
document.getElementById("grandTotal").innerText="Total: "+total+" BDT";

// PLACE ORDER
function placeOrder(){

let tx=document.getElementById("tx").value;

if(!tx){
alert("Enter TX ID");
return;
}

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx},
amount:{integerValue:String(total)},
status:{stringValue:"pending"}
}
})
})
.then(()=>{
alert("Order placed ✅");
localStorage.removeItem("cart");
location.href="index.html";
});
}

</script>

</body>
</html>
