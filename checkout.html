<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body { font-family: Arial; background:#e6f3ff; padding:20px; }

table { width:100%; border-collapse: collapse; }
th { background:#4da6ff; color:white; }
td,th { padding:10px; text-align:center; border:1px solid #ccc; }

button {
  background:#4da6ff;
  color:white;
  padding:10px;
  border:none;
}
</style>
</head>

<body>

<h2>Checkout</h2>

<table id="table">
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 id="subtotal"></h3>
<h3 id="vat"></h3>
<h2 id="total"></h2>

<input id="txid" placeholder="TX ID">
<button onclick="confirmOrder()">Confirm</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let tbody = document.querySelector("tbody");
let subtotal = 0;

cart.forEach(item=>{
  let t = item.price * item.qty;
  subtotal += t;

  tbody.innerHTML += `
  <tr>
    <td>${item.name}</td>
    <td>${item.price}</td>
    <td>${item.qty}</td>
    <td>${t}</td>
  </tr>`;
});

let vat = subtotal * 0.04;
let total = subtotal + vat;

document.getElementById("subtotal").innerText = "Subtotal: "+subtotal;
document.getElementById("vat").innerText = "VAT: "+vat.toFixed(2);
document.getElementById("total").innerText = "Total: "+total.toFixed(2);

function confirmOrder(){
  let tx = document.getElementById("txid").value;
  if(!tx) return alert("Enter TXID");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=20;
  doc.text("Invoice",80,y); y+=10;

  cart.forEach(i=>{
    doc.text(`${i.name} x${i.qty}`,10,y);
    y+=10;
  });

  doc.text("Total: "+total,10,y); y+=10;
  doc.text("TXID: "+tx,10,y);

  doc.save("invoice.pdf");
}
</script>

</body>
</html>
