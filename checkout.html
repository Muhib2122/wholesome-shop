<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body { font-family: Arial; background:#e6f3ff; padding:15px; }

table { width:100%; border-collapse: collapse; }
th { background:#4da6ff; color:white; }
td,th { padding:8px; text-align:center; border:1px solid #ccc; }

.summary {
  margin-top:15px;
  font-size:16px;
}

button {
  background:#4da6ff;
  color:white;
  padding:10px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Checkout</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="summary">
  <p id="subtotal"></p>
  <p id="vat"></p>
  <h3 id="total"></h3>
</div>

<input id="txid" placeholder="Enter TX ID">
<br>
<button onclick="confirmOrder()">Confirm</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// 🔥 Get cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let tbody = document.getElementById("tbody");
let subtotal = 0;

// 🔥 Loop products
cart.forEach(item=>{
  let qty = item.qty || 1;   // ✅ FIX
  let price = Number(item.price);
  let total = price * qty;

  subtotal += total;

  tbody.innerHTML += `
  <tr>
    <td>${item.name}</td>
    <td>${price} BDT</td>
    <td>${qty}</td>
    <td>${total} BDT</td>
  </tr>`;
});

// 🔥 VAT + TOTAL
let vat = subtotal * 0.04;
let grandTotal = subtotal + vat;

// 🔥 Show
document.getElementById("subtotal").innerText =
  "Subtotal: " + subtotal.toFixed(2) + " BDT";

document.getElementById("vat").innerText =
  "VAT (4%): " + vat.toFixed(2) + " BDT";

document.getElementById("total").innerText =
  "Total: " + grandTotal.toFixed(2) + " BDT";


// 🔥 Confirm + PDF
function confirmOrder(){
  let tx = document.getElementById("txid").value;

  if(!tx) {
    alert("TX ID lagbe!");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  doc.text("Wholesome Shop Invoice", 60, y);
  y += 10;

  cart.forEach(i=>{
    let q = i.qty || 1;
    doc.text(`${i.name} x${q}`, 10, y);
    y += 8;
  });

  y += 5;
  doc.text("Subtotal: " + subtotal, 10, y); y+=8;
  doc.text("VAT: " + vat.toFixed(2), 10, y); y+=8;
  doc.text("Total: " + grandTotal.toFixed(2), 10, y); y+=8;
  doc.text("TXID: " + tx, 10, y);

  doc.save("invoice.pdf");

  // 🔥 clear cart after order
  localStorage.removeItem("cart");
}
</script>

</body>
</html>
