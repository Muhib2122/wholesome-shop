<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body { font-family: Arial; background:#e6f3ff; padding:15px; }

table { width:100%; border-collapse: collapse; }
th { background:#4da6ff; color:white; }
td,th { padding:8px; text-align:center; border:1px solid #ccc; }

button {
  background:#4da6ff;
  color:white;
  padding:10px;
  border:none;
}
</style>
</head>

<body>

<h2>Checkout</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3 id="subtotal"></h3>
<h3 id="vat"></h3>
<h2 id="total"></h2>

<input id="txid" placeholder="TX ID">
<button onclick="confirmOrder()">Confirm</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let tbody=document.getElementById("tbody");
let subtotal=0;

cart.forEach(i=>{
  let qty=i.qty || 1;
  let t=i.price*qty;
  subtotal+=t;

  tbody.innerHTML+=`
  <tr>
    <td>${i.name}</td>
    <td>${i.price}</td>
    <td>${qty}</td>
    <td>${t}</td>
  </tr>`;
});

let vat=subtotal*0.04;
let total=subtotal+vat;

document.getElementById("subtotal").innerText="Subtotal: "+subtotal;
document.getElementById("vat").innerText="VAT: "+vat.toFixed(2);
document.getElementById("total").innerText="Total: "+total.toFixed(2);

function confirmOrder(){
  let tx=document.getElementById("txid").value;
  if(!tx) return alert("Enter TXID");

  alert("Order Confirmed ✅");
  localStorage.removeItem("cart");
}
</script>

</body>
</html>
