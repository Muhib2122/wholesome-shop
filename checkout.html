<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;background:#e0f2fe;padding:20px;">

<div style="display:flex;align-items:center;gap:10px;">
<img src="myshop.jpg" width="40">
<h2>Checkout</h2>
</div>

<h3>Pay with bKash</h3>
<img src="bkash.png" width="120"><br>
<b>01764262579</b><br><br>

<input id="tx" placeholder="Enter TX ID"><br><br>

<button onclick="place()">Confirm Order</button>

<script>

function place(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;

cart.forEach(i=> total+=i.price*i.qty);

// OLD LOGIC KEEP
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx.value},
amount:{integerValue:String(total)},
status:{stringValue:"pending"},
email:{stringValue:localStorage.getItem("user")||"N/A"}
}
})
}).then(()=>{

generatePDF(cart,total);

localStorage.removeItem("cart");
location.href="myorders.html";

});

}

// PDF (PREMIUM SIMPLE)
function generatePDF(cart,total){

let win=window.open("");

let html=`
<h2>Wholesome Shop</h2>
<hr>
${cart.map(i=>`${i.name} x${i.qty} = ${i.price*i.qty}`).join("<br>")}
<hr>
<h3>Total: ${total} BDT</h3>
`;

win.document.write(html);
win.print();
}

</script>

</body>
</html>
