<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;background:#e0f2fe;padding:15px;">

<img src="myshop.jpg" width="40">
<h2>Checkout</h2>

<h3>Pay with bKash</h3>
<img src="bkash.png" width="120"><br>
<b>01764262579</b><br><br>

<table border="1" width="100%" id="table"></table>
<br>

<input id="tx" placeholder="Enter TX ID"><br><br>

<button onclick="place()">Confirm Order</button>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let html="<tr><th>Name</th><th>Qty</th><th>Total</th></tr>";
let total=0;

cart.forEach(i=>{
let t=i.price*i.qty;
total+=t;
html+=`<tr><td>${i.name}</td><td>${i.qty}</td><td>${t}</td></tr>`;
});

html+=`<tr><td colspan="2">Total</td><td>${total}</td></tr>`;
table.innerHTML=html;

function place(){

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx.value},
amount:{integerValue:String(total)},
status:{stringValue:"pending"},
email:{stringValue:localStorage.getItem("user")||"N/A"}
}
})
}).then(()=>{
generatePDF();
localStorage.removeItem("cart");
location.href="myorders.html";
});
}

function generatePDF(){
let w=window.open("");
w.document.write(`
<h2>Wholesome Shop</h2>
<img src="myshop.jpg" width="50"><hr>
${html}
<h3>Total: ${total} BDT</h3>
`);
w.print();
}

</script>

</body>
</html>
