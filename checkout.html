<!DOCTYPE html>
<html>
<body>

<h2>Checkout</h2>

<table border="1" width="100%">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>

<tbody id="list"></tbody>
</table>

<h3 id="sum"></h3>

<img src="bkash.png" width="120">
<p>bKash: 01764262579</p>

<input id="tx" placeholder="TX ID">
<button onclick="done()">Confirm</button>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;

cart.forEach(i=>{
let t=i.price*i.qty;
total+=t;

list.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.price}</td>
<td>${i.qty}</td>
<td>${t}</td>
</tr>`;
});

let vat=total*0.04;
let grand=total+vat;

sum.innerHTML=`VAT: ${vat} <br> Total: ${grand}`;

// ORDER SAVE
function done(){

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fields:{
txid:{stringValue:tx.value},
amount:{integerValue:String(grand)},
status:{stringValue:"pending"}
}
})
}).then(()=>{
alert("Order placed ✅");
localStorage.removeItem("cart");
location="index.html";
});

}

</script>

</body>
</html>
