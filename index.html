<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f0f9ff;}
.header{background:#38bdf8;color:#fff;padding:15px;text-align:center;}

.products{display:flex;flex-wrap:wrap;gap:10px;padding:10px;}
.card{background:#fff;padding:10px;border-radius:10px;width:45%;}

.card img{width:100%;height:120px;object-fit:cover;}

button{background:#38bdf8;color:#fff;border:none;padding:6px;width:100%;}

.cart-btn{
position:fixed;
top:20px;
right:20px;
background:#0ea5e9;
color:#fff;
padding:12px;
border-radius:50%;
cursor:pointer;
}

.cart{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:#fff;
padding:10px;
transition:0.4s;
overflow:auto;
}

.cart.show{right:0;}

.item{border-bottom:1px solid #ddd;padding:5px;}
</style>
</head>

<body>

<div class="header">Wholesome Shop</div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div id="products" class="products"></div>

<div id="cart" class="cart">

<button onclick="toggleCart()" style="background:red">Close</button>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="checkout()">Checkout</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function toggleCart(){
document.getElementById("cart").classList.toggle("show");
renderCart();
}

function addToCart(name,price){
let f = cart.find(i=>i.name===name);
if(f){f.qty++}else{cart.push({name,price,qty:1})}
saveCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){
let div = document.getElementById("cartItems");
div.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;

div.innerHTML+=`
<div class="item">
${i.name}<br>

<button onclick="dec('${i.name}')">-</button>
${i.qty}
<button onclick="inc('${i.name}')">+</button>

= ${i.price*i.qty}

<button onclick="removeItem('${i.name}')">❌</button>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total;
}

function inc(name){
cart.find(i=>i.name===name).qty++;
saveCart();
}

function dec(name){
let f = cart.find(i=>i.name===name);
if(f.qty>1)f.qty--;
saveCart();
}

function removeItem(name){
cart = cart.filter(i=>i.name!==name);
saveCart();
}

function checkout(){
location.href="checkout.html";
}

// LOAD PRODUCTS
async function loadProducts(){
let res = await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products");
let data = await res.json();

let container = document.getElementById("products");
container.innerHTML="";

if(!data.documents){
container.innerHTML="<h3>No products</h3>";
return;
}

data.documents.forEach(doc=>{
let p = doc.fields;

container.innerHTML+=`
<div class="card">
<img src="${p.image.stringValue}">
<h4>${p.name.stringValue}</h4>
<p>${p.price.integerValue} BDT</p>
<button onclick="addToCart('${p.name.stringValue}',${p.price.integerValue})">Add</button>
</div>
`;
});
}

loadProducts();

</script>

</body>
</html>
