<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f0f9ff;}
.header{background:#38bdf8;color:white;padding:15px;text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

button{
background:#38bdf8;
color:white;
border:none;
padding:8px;
width:100%;
margin-top:5px;
}

.cart{
position:fixed;
right:0;
top:0;
width:250px;
height:100%;
background:white;
padding:10px;
overflow:auto;
box-shadow:-2px 0 5px rgba(0,0,0,0.2);
}

.cart-toggle{
position:fixed;
right:10px;
bottom:10px;
background:red;
color:white;
padding:10px;
border-radius:50%;
}
</style>
</head>

<body>

<div class="header">Wholesome Shop</div>

<div class="grid" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">
<button onclick="toggleCart()">Close</button>
<h3>Cart</h3>
<div id="cartItems"></div>
<b id="total"></b>
<button onclick="goCheckout()">Checkout</button>
</div>

<!-- OPEN BUTTON -->
<button class="cart-toggle" onclick="openCart()">🛒</button>

<script>

const URL = "https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// 🔥 LOAD PRODUCTS (FIXED)
async function loadProducts(){

let res = await fetch(URL + "/products");
let data = await res.json();

console.log("Products:", data);

let div = document.getElementById("products");
div.innerHTML="";

if(!data.documents){
div.innerHTML="No products found ❌";
return;
}

data.documents.forEach(d=>{
let f = d.fields;

div.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}" width="100"><br>
<b>${f.name.stringValue}</b><br>
${f.price.integerValue} BDT
<button onclick="addCart('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>
`;
});
}

// CART FUNCTIONS
function addCart(name,price){

let found = cart.find(i=>i.name===name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){

let div = document.getElementById("cartItems");
div.innerHTML="";

let total=0;

cart.forEach((i,index)=>{
total += i.price*i.qty;

div.innerHTML+=`
<div>
${i.name} (${i.qty})
<button onclick="inc(${index})">+</button>
<button onclick="dec(${index})">-</button>
<button onclick="removeItem(${index})">❌</button>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total;
}

function inc(i){
cart[i].qty++;
save();
}

function dec(i){
if(cart[i].qty>1) cart[i].qty--;
save();
}

function removeItem(i){
cart.splice(i,1);
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

// CART UI FIX
function toggleCart(){
document.getElementById("cartBox").style.display="none";
}

function openCart(){
document.getElementById("cartBox").style.display="block";
}

// CHECKOUT
function goCheckout(){
window.location.href="checkout.html";
}

renderCart();
loadProducts();

</script>

</body>
</html>
