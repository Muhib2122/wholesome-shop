<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wholesome Shop</title>

<style>
body{font-family:Arial;background:#f0f9ff;margin:0}
.header{background:#38bdf8;color:#fff;padding:15px;text-align:center}
.products{display:flex;gap:15px;padding:15px;flex-wrap:wrap}
.card{background:#fff;padding:10px;border-radius:10px;width:150px;text-align:center}
.card img{width:100%;height:100px;object-fit:cover}
button{background:#38bdf8;color:#fff;border:none;padding:5px 10px;margin-top:5px}
.cart-btn{position:fixed;right:20px;top:20px;background:#0ea5e9;color:#fff;padding:10px;border-radius:50%}
.cart{position:fixed;right:-300px;top:0;width:300px;height:100%;background:#fff;padding:10px;transition:.3s;overflow:auto}
.cart.show{right:0}
</style>
</head>

<body>

<div class="header">Wholesome Shop</div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div id="products" class="products"></div>

<div id="cart" class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<h4 id="cartTotal"></h4>
<button onclick="goCheckout()">Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function toggleCart(){
document.getElementById("cart").classList.toggle("show");
renderCart();
}

function addToCart(name, price){
let found = cart.find(i=>i.name===name);
if(found){found.qty++}
else{cart.push({name,price,qty:1})}
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

function renderCart(){
let div = document.getElementById("cartItems");
div.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
div.innerHTML+=`
<p>${i.name} (${i.qty}) - ${i.price*i.qty}</p>
`;
});

document.getElementById("cartTotal").innerText="Total: "+total;
}

function goCheckout(){
location.href="checkout.html";
}

// 🔥 Load products
async function loadProducts(){

let res = await fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products");
let data = await res.json();

let container = document.getElementById("products");
container.innerHTML="";

if(!data.documents){
container.innerHTML="<h3>No products</h3>";
return;
}

data.documents.forEach(doc=>{
let p = doc.fields;

container.innerHTML+=`
<div class="card">
<img src="${p.image.stringValue}">
<h4>${p.name.stringValue}</h4>
<p>${p.price.integerValue} BDT</p>
<button onclick="addToCart('${p.name.stringValue}', ${p.price.integerValue})">Add</button>
</div>
`;
});

}

loadProducts();
</script>

</body>
</html>
