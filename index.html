<!DOCTYPE html>
<html>

<head>

<title>Wholesome Super Shop</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- NAVBAR -->

<div class="navbar">

<div class="logo">Wholesome</div>

<input class="search" placeholder="Search products">

<div class="cart" onclick="openCart()">
🛒 <span id="cart-count">0</span>
</div>

</div>


<!-- CART PANEL -->

<div id="cartPanel" class="cart-panel">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="closeCart()">Close</button>

</div>



<!-- MAIN -->

<div class="container">

<div class="categories">

<h3>Categories</h3>

<ul>

<li onclick="filterCategory('all')">All</li>
<li onclick="filterCategory('groceries')">Groceries</li>
<li onclick="filterCategory('makeup')">Makeup</li>
<li onclick="filterCategory('clothing')">Clothing</li>

</ul>

</div>

<div id="products" class="products"></div>

</div>



<script src="products.js"></script>
<script src="cart.js"></script>
<script src="shop.js"></script>

</body>

</html>
