<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header img{
width:35px;height:35px;border-radius:50%;
}

.products{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
width:45%;
border-radius:10px;
}

.cart{
position:fixed;
top:0;
right:-100%;
width:300px;
height:100%;
background:white;
transition:0.4s;
padding:10px;
overflow:auto;
}

.cart.show{right:0;}

button{padding:5px 10px;margin-top:5px;}
</style>
</head>

<body>

<div class="header">
<div style="display:flex;align-items:center;gap:10px;">
<img src="myshop.jpg">
<b>Shop</b>
</div>

<button onclick="openCart()">Cart</button>
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">
<button onclick="closeCart()">❌</button>
<h3>Your Cart</h3>

<div id="cartItems"></div>
<h4 id="total"></h4>

<button onclick="location.href='checkout.html'">Checkout</button>
</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// LOAD PRODUCTS (OLD LOGIC)
function loadProducts(){
fetch(URL+"/products")
.then(r=>r.json())
.then(d=>{

products.innerHTML="";

(d.documents||[]).forEach(x=>{
let f=x.fields;

products.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}" width="100%">
<h4>${f.name.stringValue}</h4>
<p>${f.price.integerValue} BDT</p>
<button onclick="add('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>
`;

});
});
}

// CART (OLD STYLE + FIXED)
function getCart(){
return JSON.parse(localStorage.getItem("cart"))||[];
}

function save(cart){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function add(name,price){
let cart=getCart();
let found=cart.find(i=>i.name===name);

if(found) found.qty++;
else cart.push({name,price,qty:1});

save(cart);
}

function inc(i){
let cart=getCart();
cart[i].qty++;
save(cart);
}

function dec(i){
let cart=getCart();
if(cart[i].qty>1) cart[i].qty--;
else cart.splice(i,1);
save(cart);
}

function renderCart(){
let cart=getCart();
let html="";
let total=0;

cart.forEach((item,i)=>{
let t=item.price*item.qty;
total+=t;

html+=`
<div>
${item.name}<br>
<button onclick="dec(${i})">➖</button>
${item.qty}
<button onclick="inc(${i})">➕</button>
= ${t}
</div><hr>
`;
});

cartItems.innerHTML=html;
total.innerText="Total: "+total+" BDT";
}

function openCart(){
cartBox.classList.add("show");
renderCart();
}

function closeCart(){
cartBox.classList.remove("show");
}

loadProducts();

</script>

</body>
</html>
