<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wholesome Shop</title>

<style>
body { font-family: Arial; margin:0; background:#f5faff; }

header {
  background:#4da6ff;
  color:white;
  padding:15px;
  text-align:center;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.cart-btn {
  position:fixed;
  top:20px;
  right:20px;
  background:#4da6ff;
  color:white;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

/* Sidebar */
#cartSidebar {
  position:fixed;
  top:0;
  right:-350px;
  width:350px;
  height:100%;
  background:white;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transition:0.3s;
  padding:20px;
}

button {
  background:#4da6ff;
  color:white;
  border:none;
  padding:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header><h1>Wholesome Shop</h1></header>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- 🔥 Sidebar Cart -->
<div id="cartSidebar">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3 id="cartTotal"></h3>

  <button onclick="goCheckout()">Checkout</button>
  <br><br>
  <button onclick="closeCart()">Close ✖</button>
</div>

<div class="products" id="productList"></div>

<script type="module" src="shop.js"></script>
</body>
</html>
