<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wholesome Shop</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5faff;
}

header {
  background: #4da6ff;
  color: white;
  padding: 15px;
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

button {
  background: #4da6ff;
  color: white;
  border: none;
  padding: 8px;
  margin-top: 5px;
  cursor: pointer;
}

.checkout-box {
  background: #e6f3ff;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #4da6ff;
  color: white;
}

td, th {
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <h1>Wholesome Shop</h1>
</header>

<div class="products" id="productList"></div>

<div class="checkout-box">
  <h2>Checkout</h2>
