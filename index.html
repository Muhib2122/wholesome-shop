<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}

.header{
background:#0ea5e9;color:white;padding:10px;
display:flex;justify-content:space-between;align-items:center;
}

.header img{width:35px;height:35px;border-radius:50%;}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}

.card{background:white;padding:10px;border-radius:10px;}
.card img{width:100%;border-radius:10px;}

.cart{
position:fixed;top:0;right:-100%;
width:300px;height:100%;
background:white;padding:10px;
transition:0.4s;overflow:auto;
}
.cart.show{right:0;}
</style>
</head>

<body>

<div class="header">
<div style="display:flex;align-items:center;gap:10px;">
<img src="myshop.jpg">
<b>Shop</b>
</div>

<div>
<button onclick="openCart()">🛒</button>
<button onclick="location.href='myorders.html'">📦</button>
</div>
</div>

<!-- SEARCH + FILTER -->
<div style="padding:10px;">
<input id="search" placeholder="Search..." oninput="loadProducts()">
<select id="sort" onchange="loadProducts()">
<option value="">Sort</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>
</select>
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">
<button onclick="closeCart()">❌</button>
<h3>Your Cart</h3>

<div id="cartItems"></div>
<h4 id="total"></h4>

<button onclick="location.href='checkout.html'">Checkout</button>
</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

function loadProducts(){
fetch(URL+"/products")
.then(r=>r.json())
.then(d=>{

let search=searchInput();
let sort=sortValue();

let list=[];

(d.documents||[]).forEach(x=>{
let f=x.fields;

let name=f.name.stringValue;
let price=parseInt(f.price.integerValue);

if(name.toLowerCase().includes(search)){
list.push({name,price,img:f.image.stringValue});
}
});

if(sort==="low") list.sort((a,b)=>a.price-b.price);
if(sort==="high") list.sort((a,b)=>b.price-a.price);

products.innerHTML="";

list.forEach(p=>{
products.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} BDT</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>`;
});

});
}

function searchInput(){
return document.getElementById("search").value.toLowerCase();
}
function sortValue(){
return document.getElementById("sort").value;
}

/* CART */
function getCart(){return JSON.parse(localStorage.getItem("cart"))||[];}
function save(c){localStorage.setItem("cart",JSON.stringify(c));renderCart();}

function add(n,p){
let c=getCart();
let f=c.find(i=>i.name===n);
if(f)f.qty++; else c.push({name:n,price:p,qty:1});
save(c);
}

function inc(i){let c=getCart();c[i].qty++;save(c);}
function dec(i){
let c=getCart();
if(c[i].qty>1)c[i].qty--;
else c.splice(i,1);
save(c);
}

function renderCart(){
let c=getCart();
let html="";let total=0;

c.forEach((i,x)=>{
let t=i.price*i.qty;
total+=t;

html+=`
<div>
${i.name}<br>
➖ <button onclick="dec(${x})">-</button>
${i.qty}
<button onclick="inc(${x})">+</button> ➕
= ${t}
</div><hr>`;
});

cartItems.innerHTML=html;
totalText(total);
}

function totalText(t){
document.getElementById("total").innerText="Total: "+t+" BDT";
}

function openCart(){cartBox.classList.add("show");renderCart();}
function closeCart(){cartBox.classList.remove("show");}

loadProducts();

</script>

</body>
</html>
