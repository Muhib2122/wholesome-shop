<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{width:35px;border-radius:50%;}

.products{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
width:45%;
}

.cartPanel{
position:fixed;
right:-100%;
top:0;
width:80%;
height:100%;
background:white;
transition:.3s;
padding:15px;
overflow:auto;
}

.cartPanel.active{right:0;}

button{
background:#0ea5e9;
color:white;
border:none;
padding:6px;
border-radius:6px;
margin-top:5px;
}

.qtyBtn{background:#38bdf8;}

.totalBox{
background:#0ea5e9;
color:white;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<script>
// 🔥 SAFE LOGIN CHECK
if(!localStorage.getItem("user")){
location.href="auth.html";
}
</script>

<div class="header">
<div class="logo">
<img src="myshop.jpg">
<b>MyShop</b>
</div>

<div>
<button onclick="openCart()">Cart</button>
<button onclick="location.href='myorders.html'">My Orders</button>
<button onclick="location.href='settings.html'">Settings</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div id="products" class="products"></div>

<div id="cartPanel" class="cartPanel">
<h3>Cart</h3>
<div id="cartItems"></div>
<div id="totalBox" class="totalBox">Total: 0</div>
<button onclick="location.href='checkout.html'">Checkout</button>
<button onclick="closeCart()">Close</button>
</div>

<script>

// ✅ FIXED LOGOUT
function logout(){
localStorage.removeItem("user"); // 🔥 only user remove
location.href="auth.html";
}

// LOAD PRODUCTS
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products")
.then(r=>r.json())
.then(d=>{
let html="";
d.documents?.forEach(x=>{
let f=x.fields;

html+=`
<div class="card">
<img src="${f.image.stringValue}" width="100%">
<h4>${f.name.stringValue}</h4>
<p>${f.price.integerValue} BDT</p>
<button onclick="add('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>
`;
});
products.innerHTML=html;
});

// CART
function add(name,price){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let f=cart.find(i=>i.name===name);
if(f) f.qty++;
else cart.push({name,price,qty:1});
localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

function loadCart(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let html="";
let sum=0;

cart.forEach((item,i)=>{
sum+=item.price*item.qty;

html+=`
<div>
${item.name}<br>
${item.price} × ${item.qty}<br>
<button class="qtyBtn" onclick="changeQty(${i},1)">➕</button>
<button class="qtyBtn" onclick="changeQty(${i},-1)">➖</button>
<button class="qtyBtn" onclick="removeItem(${i})">❌</button>
<hr>
</div>
`;
});

cartItems.innerHTML=html;
totalBox.innerText="Total: "+sum+" BDT";
}

function changeQty(i,v){
let cart=JSON.parse(localStorage.getItem("cart"));
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

function removeItem(i){
let cart=JSON.parse(localStorage.getItem("cart"));
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

function openCart(){
document.getElementById("cartPanel").classList.add("active");
loadCart();
}

function closeCart(){
document.getElementById("cartPanel").classList.remove("active");
}

</script>

</body>
</html>
