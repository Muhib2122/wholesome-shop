<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0ea5e9">

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.header-right{
display:flex;
gap:10px;
align-items:center;
}

.container{padding:15px;}

.card{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#0ea5e9;
color:white;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.topbar{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

.cartbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="header-left">
<img src="myshop.jpg" width="40">
<b>Shop</b>
</div>

<div class="header-right">

<!-- 🔥 NEW: MY ORDERS BUTTON -->
<button onclick="goOrders()">📦 My Orders</button>

<!-- EXISTING CART ICON -->
<span onclick="goCart()">🛒</span>

</div>

</div>

<div class="container">

<!-- SEARCH + SORT + CATEGORY -->
<div class="topbar">
<input id="search" placeholder="Search product...">

<select id="sort">
<option value="">Sort</option>
<option value="low">Price Low</option>
<option value="high">Price High</option>
</select>

<select id="category">
<option value="all">All products</option>
<option value="clothing">clothing</option>
<option value="health accessory">health accessory</option>
<option value="makeup accessory">makeup accessory</option>
<option value="playing accessory">playing accessory</option>
<option value="toy">toy</option>
<option value="home accessory">home accessory</option>
</select>

<button onclick="loadProducts()">Go</button>
</div>

<div id="products"></div>

</div>

<!-- CART BAR -->
<div class="cartbar">
<span id="cartCount">0 items</span>
<button onclick="checkout()">Checkout</button>
</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

// 🔥 NEW FUNCTION (ONLY ADD)
function goOrders(){
location.href="myorders.html";
}

// EXISTING
function goCart(){
location.href="cart.html";
}

function checkout(){
location.href="checkout.html";
}

function addToCart(name,price,image){
cart.push({name,price,image});
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
cartCount.innerText=cart.length+" items";
}

function loadProducts(){

fetch(URL+"/products")
.then(r=>r.json())
.then(d=>{

products.innerHTML="";

let list=d.documents||[];

let searchVal=search.value.toLowerCase();
let sortVal=sort.value;
let catVal=category.value;

list=list.filter(doc=>{
let f=doc.fields;

let name=f.name.stringValue.toLowerCase();
let cat=f.category?.stringValue||"toy";

return name.includes(searchVal) &&
(catVal==="all" || cat===catVal);
});

if(sortVal==="low"){
list.sort((a,b)=>a.fields.price.integerValue - b.fields.price.integerValue);
}
if(sortVal==="high"){
list.sort((a,b)=>b.fields.price.integerValue - a.fields.price.integerValue);
}

list.forEach(doc=>{
let f=doc.fields;

products.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}" width="100"><br>
<b>${f.name.stringValue}</b><br>
${f.price.integerValue} BDT<br>
<button onclick="addToCart('${f.name.stringValue}',${f.price.integerValue},'${f.image.stringValue}')">Add</button>
</div>
`;
});

updateCart();

});

}

loadProducts();

</script>

</body>
</html>
