<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#e0f2fe;
}

/* HEADER */
.header{
background:#0ea5e9;
color:white;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.header img{
width:35px;
height:35px;
border-radius:50%;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
}

.card h4{
margin:5px 0;
}

.card button{
background:#0ea5e9;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}

/* CART */
.cart{
position:fixed;
top:0;
right:-100%;
width:300px;
height:100%;
background:white;
transition:0.4s;
padding:15px;
overflow:auto;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
}

.cart.show{
right:0;
}

.cart-item{
border-bottom:1px solid #ddd;
padding:8px 0;
}

.qty-btn{
padding:3px 8px;
margin:0 5px;
}

/* TOTAL */
.total{
font-weight:bold;
margin-top:10px;
}

.checkout-btn{
width:100%;
background:#16a34a;
color:white;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="header-left">
<img src="myshop.jpg">
<b>Shop</b>
</div>

<button onclick="openCart()">🛒</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">

<button onclick="closeCart()">❌</button>
<h3>Your Cart</h3>

<div id="cartItems"></div>

<div class="total" id="total"></div>

<button class="checkout-btn" onclick="location.href='checkout.html'">
Checkout
</button>

</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// ================= PRODUCTS (UNCHANGED LOGIC)
function loadProducts(){
fetch(URL+"/products")
.then(r=>r.json())
.then(d=>{

products.innerHTML="";

(d.documents||[]).forEach(doc=>{

let f=doc.fields;

products.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}">
<h4>${f.name.stringValue}</h4>
<p>${f.price.integerValue} BDT</p>
<button onclick="add('${f.name.stringValue}',${f.price.integerValue})">
Add
</button>
</div>
`;

});

});
}

// ================= CART (UNCHANGED CORE)

function getCart(){
return JSON.parse(localStorage.getItem("cart"))||[];
}

function save(cart){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function add(name,price){
let cart=getCart();

let found=cart.find(i=>i.name===name);

if(found) found.qty++;
else cart.push({name,price,qty:1});

save(cart);
}

function inc(i){
let cart=getCart();
cart[i].qty++;
save(cart);
}

function dec(i){
let cart=getCart();

if(cart[i].qty>1) cart[i].qty--;
else cart.splice(i,1);

save(cart);
}

function renderCart(){

let cart=getCart();
let html="";
let totalAmount=0;

cart.forEach((item,i)=>{

let subtotal=item.price*item.qty;
totalAmount+=subtotal;

html+=`
<div class="cart-item">
${item.name}<br>

<button class="qty-btn" onclick="dec(${i})">➖</button>
${item.qty}
<button class="qty-btn" onclick="inc(${i})">➕</button>

= ${subtotal} BDT
</div>
`;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: "+totalAmount+" BDT";

}

// ================= UI

function openCart(){
document.getElementById("cartBox").classList.add("show");
renderCart();
}

function closeCart(){
document.getElementById("cartBox").classList.remove("show");
}

// INIT
loadProducts();

</script>

</body>
</html>
