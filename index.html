<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wholesome Shop</title>

<style>
body { font-family: Arial; margin:0; background:#f5faff; }

/* Header */
header {
  background:#4da6ff;
  color:white;
  padding:15px;
  text-align:center;
}

/* Products */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* 🔥 CART BUTTON */
.cart-btn {
  position:fixed;
  top:15px;
  right:15px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  cursor:pointer;
  z-index:2000;
}

/* COUNT */
#cartCount {
  background:red;
  color:white;
  font-size:12px;
  padding:2px 6px;
  border-radius:50%;
  position:absolute;
  top:-5px;
  right:-5px;
}

/* 🔥 SIDEBAR FIX */
#cartSidebar {
  position:fixed;
  top:0;
  right:-100%;
  width:350px;
  height:100vh;
  background:white;
  box-shadow:-4px 0 20px rgba(0,0,0,0.3);
  transition:0.3s;
  display:flex;
  flex-direction:column;
  z-index:1500;
}

/* 🔥 SCROLL AREA */
#cartItems {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* 🔥 FOOTER FIX (always visible) */
.cart-footer {
  padding:10px;
  border-top:1px solid #ddd;
  background:white;
}

/* Overlay */
#overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:1400;
}

button {
  background:#4da6ff;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
  width:100%;
}
</style>
</head>

<body>

<header><h2>Wholesome Shop</h2></header>

<!-- 🔥 CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
  🛍️ <span id="cartCount">0</span>
</div>

<div id="overlay" onclick="closeCart()"></div>

<!-- 🔥 SIDEBAR -->
<div id="cartSidebar">

  <h3 style="padding:10px;">Cart</h3>

  <div id="cartItems"></div>

  <!-- 🔥 FIXED FOOTER -->
  <div class="cart-footer">
    <h4 id="cartTotal"></h4>

    <!-- 🔥 SIDE CHECKOUT BUTTON -->
    <button onclick="goCheckout()">Checkout</button>

    <button onclick="closeCart()">Close</button>
  </div>

</div>

<div class="products" id="productList"></div>

<script type="module" src="shop.js"></script>
</body>
</html>
