<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f0f9ff;}
.header{background:#38bdf8;color:white;padding:15px;text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

button{
background:#38bdf8;
color:white;
border:none;
padding:8px;
width:100%;
margin-top:5px;
}

.cart{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:white;
padding:10px;
overflow:auto;
}

.open{
position:fixed;
bottom:10px;
right:10px;
background:red;
color:white;
padding:10px;
border-radius:50%;
}
</style>
</head>

<body>

<div class="header">Wholesome Shop</div>

<div id="products" class="grid"></div>

<div id="cartBox" class="cart">
<button onclick="closeCart()">Close</button>
<h3>Cart</h3>
<div id="cartItems"></div>
<b id="total"></b>
<button onclick="goCheckout()">Checkout</button>
</div>

<button class="open" onclick="openCart()">🛒</button>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let cart = JSON.parse(localStorage.getItem("cart"))||[];

// 🔥 LOAD PRODUCTS
async function loadProducts(){

let res = await fetch(URL+"/products");
let data = await res.json();

let div=document.getElementById("products");
div.innerHTML="";

if(!data.documents){
div.innerHTML="No products ❌";
return;
}

data.documents.forEach(d=>{
let f=d.fields;

div.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}" width="100"><br>
<b>${f.name.stringValue}</b><br>
${f.price.integerValue} BDT
<button onclick="addCart('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>
`;
});
}

// CART
function addCart(n,p){
let f=cart.find(i=>i.name===n);
if(f) f.qty++;
else cart.push({name:n,price:p,qty:1});

save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){
let div=document.getElementById("cartItems");
div.innerHTML="";
let t=0;

cart.forEach((i,x)=>{
t+=i.price*i.qty;

div.innerHTML+=`
<div>
${i.name} (${i.qty})
<button onclick="iPlus(${x})">+</button>
<button onclick="iMinus(${x})">-</button>
<button onclick="del(${x})">❌</button>
</div>
`;
});

document.getElementById("total").innerText="Total: "+t;
}

function iPlus(x){cart[x].qty++;save();}
function iMinus(x){if(cart[x].qty>1)cart[x].qty--;save();}
function del(x){cart.splice(x,1);save();}

// UI
function closeCart(){document.getElementById("cartBox").style.display="none";}
function openCart(){document.getElementById("cartBox").style.display="block";}

function goCheckout(){window.location="checkout.html";}

renderCart();
loadProducts();

</script>

</body>
</html>
