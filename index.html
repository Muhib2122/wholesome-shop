<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.products{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
width:45%;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#0ea5e9;
color:white;
border:none;
padding:6px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

/* CART PANEL */
.cartPanel{
position:fixed;
right:-100%;
top:0;
width:80%;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
transition:0.3s;
padding:15px;
overflow:auto;
z-index:999;
}

.cartPanel.active{
right:0;
}

.cartItem{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.qtyBtn{
padding:4px 8px;
margin:2px;
background:#38bdf8;
border-radius:5px;
}

.totalBox{
background:#0ea5e9;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
location.href="auth.html";
}
</script>

<div class="header">
<div>🛒 Shop</div>

<div>
<button onclick="openCart()">Cart</button>
<button onclick="goOrders()">My Orders</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="products" id="products"></div>

<!-- CART PANEL -->
<div id="cartPanel" class="cartPanel">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>

<div class="totalBox" id="total">Total: 0</div>

<button onclick="goCheckout()">Checkout</button>
<button onclick="closeCart()">Close</button>
</div>

<script>

function logout(){
localStorage.removeItem("user");
location.href="auth.html";
}

function goOrders(){
location.href="myorders.html";
}

function goCheckout(){
location.href="checkout.html";
}

// LOAD PRODUCTS
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products")
.then(r=>r.json())
.then(d=>{
let html="";

d.documents?.forEach(x=>{
let f=x.fields;

let name=f.name.stringValue;
let price=parseInt(f.price.integerValue);
let img=f.image.stringValue;

html+=`
<div class="card">
<img src="${img}" width="100%">
<h4>${name}</h4>
<p>${price} BDT</p>
<button onclick="add('${name}',${price})">Add</button>
</div>
`;
});

products.innerHTML=html;
});

// CART
function add(name,price){
let cart=JSON.parse(localStorage.getItem("cart"))||[];

let found=cart.find(i=>i.name===name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

// LOAD CART
function loadCart(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let html="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price*item.qty;

html+=`
<div class="cartItem">
<b>${item.name}</b><br>
${item.price} × ${item.qty}

<br>

<button class="qtyBtn" onclick="changeQty(${i},1)">➕</button>
<button class="qtyBtn" onclick="changeQty(${i},-1)">➖</button>
<button class="qtyBtn" onclick="removeItem(${i})">❌</button>
</div>
`;
});

cartItems.innerHTML=html;
total.innerText="Total: "+total+" BDT";
}

// CHANGE QTY
function changeQty(i,val){
let cart=JSON.parse(localStorage.getItem("cart"));
cart[i].qty+=val;

if(cart[i].qty<=0) cart.splice(i,1);

localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

// REMOVE
function removeItem(i){
let cart=JSON.parse(localStorage.getItem("cart"));
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

// PANEL
function openCart(){
document.getElementById("cartPanel").classList.add("active");
loadCart();
}

function closeCart(){
document.getElementById("cartPanel").classList.remove("active");
}

</script>

</body>
</html>
