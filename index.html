<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.products{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
width:45%;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#0ea5e9;
color:white;
border:none;
padding:6px;
border-radius:6px;
margin-top:5px;
}

.cartBtn{
background:#22c55e;
}

</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
location.href="auth.html";
}
</script>

<div class="header">
<div>🛒 Shop</div>

<div>
<button onclick="goOrders()">My Orders</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="products" id="products"></div>

<script>

function logout(){
localStorage.removeItem("user");
location.href="auth.html";
}

function goOrders(){
location.href="myorders.html";
}

// 🔥 LOAD PRODUCTS FROM FIRESTORE
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products")
.then(r=>r.json())
.then(d=>{
let html="";

d.documents?.forEach(x=>{
let f=x.fields;

let name=f.name.stringValue;
let price=parseInt(f.price.integerValue);
let img=f.image.stringValue;

html+=`
<div class="card">
<img src="${img}" width="100%">
<h4>${name}</h4>
<p>${price} BDT</p>

<button onclick="add('${name}',${price})">Add to Cart</button>
</div>
`;
});

products.innerHTML=html;
});

// CART
function add(name,price){
let cart=JSON.parse(localStorage.getItem("cart"))||[];

let found=cart.find(i=>i.name===name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added");
}

// GO CHECKOUT
document.body.insertAdjacentHTML("beforeend",`
<div style="position:fixed;bottom:10px;right:10px;">
<button class="cartBtn" onclick="location.href='checkout.html'">Checkout</button>
</div>
`);

</script>

</body>
</html>
