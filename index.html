<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wholesome Shop</title>

<style>
body { font-family: Arial; margin:0; background:#f5faff; }

/* Header */
header {
  background:#4da6ff;
  color:white;
  padding:15px;
  text-align:center;
}

/* Product Grid */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* 🔥 Cart Button */
.cart-btn {
  position:fixed;
  top:15px;
  right:15px;
  background:#4da6ff;
  color:white;
  padding:12px;
  border-radius:50%;
  font-size:18px;
  z-index:2000;
}

/* 🔥 Sidebar FIXED */
#cartSidebar {
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  max-width:320px;
  height:100%;
  background:white;
  box-shadow:-2px 0 10px rgba(0,0,0,0.3);
  transition:0.3s;
  padding:15px;
  z-index:1500;
}

/* Overlay */
#overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:1400;
}

button {
  background:#4da6ff;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
}
</style>
</head>

<body>

<header><h2>Wholesome Shop</h2></header>

<!-- Cart Button -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- Overlay -->
<div id="overlay" onclick="closeCart()"></div>

<!-- Sidebar -->
<div id="cartSidebar">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <h4 id="cartTotal"></h4>

  <button onclick="goCheckout()">Checkout</button>
  <br><br>
  <button onclick="closeCart()">Close ✖</button>
</div>

<div class="products" id="productList"></div>

<script type="module" src="shop.js"></script>
</body>
</html>
