<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0ea5e9">

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{background:#0ea5e9;color:white;padding:10px;display:flex;justify-content:space-between;align-items:center;}
.container{padding:15px;}
.card{background:white;padding:10px;margin-bottom:15px;border-radius:15px;}
button{padding:8px 12px;border:none;background:#0ea5e9;color:white;border-radius:8px;}
input,select{padding:8px;border-radius:8px;border:1px solid #ccc;margin-right:5px;}
.topbar{display:flex;gap:5px;margin-bottom:15px;flex-wrap:wrap;}
.cartBox{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #ccc;}
</style>
</head>

<body>

<div class="header">
<b>Shop</b>
<div onclick="location.href='cart.html'">🛒</div>
</div>

<div class="container">

<div class="topbar">
<input id="search" placeholder="Search product...">

<select id="sort">
<option value="">Sort</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>

<select id="category">
<option value="all">All products</option>
<option value="clothing">clothing</option>
<option value="health accessory">health accessory</option>
<option value="makeup accessory">makeup accessory</option>
<option value="playing accessory">playing accessory</option>
<option value="toy">toy</option>
<option value="home accessory">home accessory</option>
</select>

<button onclick="loadProducts()">Go</button>
</div>

<div id="products"></div>

</div>

<!-- 🔥 CART BAR -->
<div class="cartBox">
<span id="cartCount">0 items</span>
<button onclick="location.href='checkout.html'">Checkout</button>
</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// 🔥 ADD TO CART (FIXED)
function addCart(name,price){

let found = cart.find(i=>i.name===name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartUI();
}

// 🔥 CART UI
function updateCartUI(){
let total = cart.reduce((a,b)=>a+b.qty,0);
document.getElementById("cartCount").innerText = total + " items";
}

// 🔥 LOAD PRODUCTS (WITH CATEGORY)
function loadProducts(){

fetch(URL+"/products")
.then(r=>r.json())
.then(d=>{

let data = d.documents || [];

let searchVal = document.getElementById("search").value.toLowerCase();
let sortVal = document.getElementById("sort").value;
let catVal = document.getElementById("category").value;

products.innerHTML="";

// FILTER
data = data.filter(doc=>{
let f = doc.fields;
let name = f.name.stringValue.toLowerCase();
let cat = f.category?.stringValue || "toy";

return name.includes(searchVal) && (catVal==="all" || cat===catVal);
});

// SORT
data.sort((a,b)=>{
let pa = parseInt(a.fields.price.integerValue);
let pb = parseInt(b.fields.price.integerValue);

if(sortVal==="low") return pa-pb;
if(sortVal==="high") return pb-pa;
return 0;
});

// RENDER
data.forEach(doc=>{
let f=doc.fields;

products.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}" width="100%">
<h3>${f.name.stringValue}</h3>
<p>${f.price.integerValue} BDT</p>
<button onclick="addCart('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>
`;
});

});
}

// CATEGORY AUTO RELOAD
document.getElementById("category").addEventListener("change",loadProducts);

// INIT
loadProducts();
updateCartUI();

// SW
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
