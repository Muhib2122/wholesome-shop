<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{background:#0ea5e9;color:white;padding:10px;display:flex;justify-content:space-between;}
.products{display:flex;flex-wrap:wrap;padding:10px;gap:10px;}
.card{background:white;padding:10px;width:45%;border-radius:10px;}
.cart{
position:fixed;
top:0;right:-100%;
width:300px;height:100%;
background:white;
padding:10px;
transition:0.4s;
overflow:auto;
}
.cart.show{right:0;}
</style>
</head>

<body>

<div class="header">
<b>🛒 Shop</b>
<div>
<button onclick="openCart()">Cart</button>
<button onclick="location.href='profile.html'">Profile</button>
</div>
</div>

<!-- SEARCH + FILTER -->
<div style="padding:10px;">
<input id="search" placeholder="Search..." oninput="loadProducts()">
<select id="sort" onchange="loadProducts()">
<option value="">Sort</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>
</select>
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">
<button onclick="closeCart()">❌</button>
<h3>Your Cart</h3>
<div id="cartItems"></div>
<h4 id="total"></h4>
<button onclick="goCheckout()">Checkout</button>
</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// LOAD PRODUCTS
function loadProducts(){
fetch(URL+"/products")
.then(r=>r.json())
.then(d=>{

let search = document.getElementById("search").value.toLowerCase();
let sort = document.getElementById("sort").value;

let items=[];

(d.documents||[]).forEach(x=>{
let f=x.fields;

let name=f.name.stringValue;
let price=parseInt(f.price.integerValue);
let img=f.image.stringValue;

if(name.toLowerCase().includes(search)){
items.push({name,price,img});
}
});

// SORT
if(sort==="low") items.sort((a,b)=>a.price-b.price);
if(sort==="high") items.sort((a,b)=>b.price-a.price);

let html="";
items.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}" width="100%">
<h4>${p.name}</h4>
<p>${p.price} BDT</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>
`;
});

products.innerHTML=html;

});
}

// CART
function getCart(){
return JSON.parse(localStorage.getItem("cart"))||[];
}

function save(cart){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function add(name,price){
let cart=getCart();
let found=cart.find(i=>i.name===name);

if(found){found.qty++;}
else{cart.push({name,price,qty:1});}

save(cart);
}

function inc(i){
let cart=getCart();
cart[i].qty++;
save(cart);
}

function dec(i){
let cart=getCart();
if(cart[i].qty>1) cart[i].qty--;
else cart.splice(i,1);
save(cart);
}

function renderCart(){
let cart=getCart();
let html="";
let total=0;

cart.forEach((item,i)=>{
let t=item.price*item.qty;
total+=t;

html+=`
<div>
${item.name}<br>
<button onclick="dec(${i})">➖</button>
${item.qty}
<button onclick="inc(${i})">➕</button>
= ${t}
</div><hr>
`;
});

cartItems.innerHTML=html;
document.getElementById("total").innerText="Total: "+total+" BDT";
}

function openCart(){
cartBox.classList.add("show");
renderCart();
}

function closeCart(){
cartBox.classList.remove("show");
}

function goCheckout(){
location.href="checkout.html";
}

loadProducts();

</script>

</body>
</html>
