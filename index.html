<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f0f9ff;}
.header{background:#38bdf8;color:white;padding:15px;text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

button{
background:#38bdf8;
color:white;
border:none;
padding:8px;
width:100%;
}

.cart{
position:fixed;
right:0;
top:0;
width:250px;
height:100%;
background:white;
padding:10px;
overflow:auto;
box-shadow:-2px 0 5px rgba(0,0,0,0.2);
}

.close{
background:red;
color:white;
padding:5px;
}
</style>
</head>

<body>

<div class="header">Wholesome Shop</div>

<div class="grid" id="products"></div>

<div class="cart" id="cartBox">
<button class="close" onclick="toggleCart()">Close</button>
<h3>Cart</h3>
<div id="cartItems"></div>
<b id="total"></b>
<button onclick="goCheckout()">Checkout</button>
</div>

<script src="firebase.js"></script>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// 🔥 LOAD PRODUCTS
async function loadProducts(){

let res = await fetch(BASE_URL+"/products");
let data = await res.json();

let div = document.getElementById("products");
div.innerHTML="";

if(!data.documents){
div.innerHTML="No products";
return;
}

data.documents.forEach(d=>{
let f = d.fields;

div.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}" width="100">
<h4>${f.name.stringValue}</h4>
<p>${f.price.integerValue} BDT</p>
<button onclick="addCart('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>
`;
});
}

// ADD CART
function addCart(name,price){

let found = cart.find(i=>i.name===name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

// RENDER CART
function renderCart(){

let div = document.getElementById("cartItems");
div.innerHTML="";

let total=0;

cart.forEach((i,index)=>{

total += i.price*i.qty;

div.innerHTML+=`
<div>
${i.name} (${i.qty}) - ${i.price*i.qty}
<button onclick="removeItem(${index})">❌</button>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total;
}

// REMOVE
function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

// CHECKOUT
function goCheckout(){
window.location.href="checkout.html";
}

function toggleCart(){
document.getElementById("cartBox").style.display="none";
}

renderCart();
loadProducts();

</script>

</body>
</html>
