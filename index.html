<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop</title>

<style>
body{margin:0;font-family:sans-serif;background:#f1f5f9;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#0ea5e9;
color:white;
padding:10px;
}

.btn{
background:white;
color:#0ea5e9;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.cartBox{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:white;
padding:10px;
display:none;
overflow:auto;
}

.cartItem{
display:flex;
justify-content:space-between;
margin:5px 0;
}
</style>
</head>

<body>

<div class="header">
<b>Wholesome Shop</b>
<div>
<span class="btn" onclick="openCart()">Cart</span>
<span class="btn" onclick="goCheckout()">Checkout</span>
</div>
</div>

<div id="products" class="grid"></div>

<div id="cartBox" class="cartBox">
<button onclick="closeCart()">Close</button>
<h3>Cart</h3>
<div id="cartItems"></div>
<h4 id="total"></h4>
</div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let cart=JSON.parse(localStorage.getItem("cart"))||[];

// LOAD PRODUCTS
async function load(){
let r=await fetch(URL+"/products");
let d=await r.json();

products.innerHTML="";

d.documents?.forEach(x=>{
let f=x.fields;

products.innerHTML+=`
<div class="card">
<img src="${f.image.stringValue}" width="100"><br>
<b>${f.name.stringValue}</b><br>
${f.price.integerValue} BDT
<button onclick="add('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>`;
});
}

// CART
function add(n,p){
let f=cart.find(i=>i.name===n);
if(f)f.qty++;
else cart.push({name:n,price:p,qty:1});
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

function render(){
cartItems.innerHTML="";
let t=0;

cart.forEach((i,x)=>{
t+=i.price*i.qty;

cartItems.innerHTML+=`
<div class="cartItem">
${i.name} (${i.qty})
<div>
<button onclick="plus(${x})">+</button>
<button onclick="minus(${x})">-</button>
<button onclick="del(${x})">❌</button>
</div>
</div>`;
});

total.innerText="Total: "+t;
}

function plus(x){cart[x].qty++;save();}
function minus(x){if(cart[x].qty>1)cart[x].qty--;save();}
function del(x){cart.splice(x,1);save();}

// UI
function openCart(){cartBox.style.display="block";}
function closeCart(){cartBox.style.display="none";}
function goCheckout(){location="checkout.html";}

render();
load();

</script>

</body>
</html>
