<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.products{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
width:45%;
}

button{
background:#0ea5e9;
color:white;
border:none;
padding:6px;
border-radius:6px;
margin-top:5px;
}

.cartPanel{
position:fixed;
right:-100%;
top:0;
width:80%;
height:100%;
background:white;
transition:0.3s;
padding:15px;
overflow:auto;
}

.cartPanel.active{right:0;}

.qtyBtn{background:#38bdf8;padding:5px;margin:2px;}

.totalBox{
background:#0ea5e9;
color:white;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
location.href="auth.html";
}
</script>

<div class="header">
<div>🛒 Shop</div>

<div>
<button onclick="openCart()">Cart</button>
<button onclick="location.href='myorders.html'">My Orders</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div id="cartPanel" class="cartPanel">
<h3>Cart</h3>

<div id="cartItems"></div>

<div class="totalBox" id="totalBox">Total: 0</div>

<button onclick="location.href='checkout.html'">Checkout</button>
<button onclick="closeCart()">Close</button>
</div>

<script>

function logout(){
localStorage.removeItem("user");
location.href="auth.html";
}

// LOAD PRODUCTS
fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/products")
.then(r=>r.json())
.then(d=>{
let html="";

d.documents?.forEach(x=>{
let f=x.fields;

html+=`
<div class="card">
<img src="${f.image.stringValue}" width="100%">
<h4>${f.name.stringValue}</h4>
<p>${f.price.integerValue} BDT</p>
<button onclick="add('${f.name.stringValue}',${f.price.integerValue})">Add</button>
</div>
`;
});

products.innerHTML=html;
});

// ADD CART
function add(name,price){
let cart=JSON.parse(localStorage.getItem("cart"))||[];

let f=cart.find(i=>i.name===name);

if(f) f.qty++;
else cart.push({name,price,qty:1});

localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

// LOAD CART
function loadCart(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let html="";
let sum=0;

cart.forEach((item,i)=>{
sum += item.price * item.qty;

html+=`
<div>
<b>${item.name}</b><br>
${item.price} × ${item.qty}
<br>
<button class="qtyBtn" onclick="changeQty(${i},1)">➕</button>
<button class="qtyBtn" onclick="changeQty(${i},-1)">➖</button>
<button class="qtyBtn" onclick="removeItem(${i})">❌</button>
<hr>
</div>
`;
});

cartItems.innerHTML=html;
document.getElementById("totalBox").innerText = "Total: "+sum+" BDT";
}

// CHANGE QTY
function changeQty(i,v){
let cart=JSON.parse(localStorage.getItem("cart"));
cart[i].qty+=v;

if(cart[i].qty<=0) cart.splice(i,1);

localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

// REMOVE
function removeItem(i){
let cart=JSON.parse(localStorage.getItem("cart"));
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

function openCart(){
document.getElementById("cartPanel").classList.add("active");
loadCart();
}

function closeCart(){
document.getElementById("cartPanel").classList.remove("active");
}

</script>

</body>
</html>
