<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;background:#e0f2fe;}
.card{background:white;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h2 style="text-align:center;">My Orders</h2>
<div id="orders"></div>

<script>

if(!localStorage.getItem("user")){
location.href="auth.html";
}

const user = localStorage.getItem("user");

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders")
.then(r=>r.json())
.then(d=>{
let html="";

d.documents?.forEach(x=>{
let f=x.fields;

if(f.user?.stringValue===user){

html+=`
<div class="card">
TX: ${f.txid?.stringValue || ""}<br>
Amount: ${f.amount?.integerValue || ""}<br>
Status: ${f.status?.stringValue || ""}
</div>
`;
}
});

orders.innerHTML=html;
});
</script>

</body>
</html>
