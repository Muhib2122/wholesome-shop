<!DOCTYPE html>
<html>

<head>

<title>Wholesome 3D Shop</title>

<style>

body{
margin:0;
overflow:hidden;
}

#info{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:6px;
font-family:Arial;
}

</style>

</head>

<body>

<div id="info">
W A S D = Move<br>
Mouse = Look Around
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);

document.body.appendChild(renderer.domElement);


let light = new THREE.PointLight(0xffffff,1);

light.position.set(10,10,10);

scene.add(light);


let floorGeometry = new THREE.PlaneGeometry(50,50);

let floorMaterial = new THREE.MeshStandardMaterial({color:0x808080});

let floor = new THREE.Mesh(floorGeometry,floorMaterial);

floor.rotation.x = -Math.PI/2;

scene.add(floor);


function createShelf(x,z){

let geometry = new THREE.BoxGeometry(4,2,1);

let material = new THREE.MeshStandardMaterial({color:0x8B4513});

let shelf = new THREE.Mesh(geometry,material);

shelf.position.set(x,1,z);

scene.add(shelf);

}

createShelf(0,-5);
createShelf(6,-5);
createShelf(-6,-5);
createShelf(0,-10);


camera.position.set(0,2,5);


let keys = {};

document.addEventListener("keydown",(e)=>{

keys[e.key.toLowerCase()] = true;

});

document.addEventListener("keyup",(e)=>{

keys[e.key.toLowerCase()] = false;

});


function move(){

if(keys["w"]) camera.position.z -= 0.1;

if(keys["s"]) camera.position.z += 0.1;

if(keys["a"]) camera.position.x -= 0.1;

if(keys["d"]) camera.position.x += 0.1;

}


function animate(){

requestAnimationFrame(animate);

move();

renderer.render(scene,camera);

}

animate();

</script>

</body>

</html>
