<!DOCTYPE html>
<html>

<head>
<title>Wholesome 3D Supermarket</title>

<style>

body{
margin:0;
overflow:hidden;
}

#info{
position:absolute;
top:10px;
left:10px;
background:white;
padding:8px;
border-radius:5px;
font-family:Arial;
}

</style>

</head>

<body>

<div id="info">
W A S D = Move
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);


// LIGHT
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);


// FLOOR
const floorGeo = new THREE.PlaneGeometry(120,120);
const floorMat = new THREE.MeshStandardMaterial({color:0x808080});

const floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;

scene.add(floor);


// SHELF FUNCTION
function createShelf(x,z){

const geo = new THREE.BoxGeometry(4,2,1);
const mat = new THREE.MeshStandardMaterial({color:0x8B4513});

const shelf = new THREE.Mesh(geo,mat);
shelf.position.set(x,1,z);

scene.add(shelf);

}


// CREATE AISLES
createShelf(-10,-10)
createShelf(0,-10)
createShelf(10,-10)

createShelf(-10,-20)
createShelf(0,-20)
createShelf(10,-20)

createShelf(-10,-30)
createShelf(0,-30)
createShelf(10,-30)


// PRODUCT BOX FUNCTION
function createProduct(x,y,z,color){

const geo = new THREE.BoxGeometry(0.6,0.6,0.6);
const mat = new THREE.MeshStandardMaterial({color:color});

const box = new THREE.Mesh(geo,mat);

box.position.set(x,y,z);

scene.add(box);

}


// PRODUCTS
createProduct(-10,2,-10,0xff0000)
createProduct(0,2,-10,0x00ff00)
createProduct(10,2,-10,0x0000ff)

createProduct(-10,2,-20,0xffff00)
createProduct(0,2,-20,0xff00ff)
createProduct(10,2,-20,0x00ffff)


// CAMERA
camera.position.set(0,2,5)


// MOVEMENT
let keys = {}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false
})


function move(){

if(keys["w"]) camera.position.z -= 0.2
if(keys["s"]) camera.position.z += 0.2
if(keys["a"]) camera.position.x -= 0.2
if(keys["d"]) camera.position.x += 0.2

}


// LOOP
function animate(){

requestAnimationFrame(animate)

move()

renderer.render(scene,camera)

}

animate()

</script>

</body>

</html>
