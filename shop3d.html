<!DOCTYPE html>
<html>

<head>
<title>Wholesome 3D Shop</title>

<style>
body{
margin:0;
overflow:hidden;
}

#info{
position:absolute;
top:10px;
left:10px;
background:white;
padding:8px;
border-radius:5px;
font-family:Arial;
}
</style>

</head>

<body>

<div id="info">
W A S D = Move
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // sky color


const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);


// LIGHT
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);


// FLOOR
const floorGeo = new THREE.PlaneGeometry(50,50);
const floorMat = new THREE.MeshStandardMaterial({color:0x808080});

const floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;

scene.add(floor);


// SHELF
const shelfGeo = new THREE.BoxGeometry(4,2,1);
const shelfMat = new THREE.MeshStandardMaterial({color:0x8B4513});

const shelf = new THREE.Mesh(shelfGeo,shelfMat);
shelf.position.set(0,1,-5);

scene.add(shelf);


// CAMERA
camera.position.set(0,2,5);
camera.lookAt(0,1,-5);


// MOVEMENT
let keys = {};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

function move(){

if(keys["w"]) camera.position.z -= 0.1;
if(keys["s"]) camera.position.z += 0.1;
if(keys["a"]) camera.position.x -= 0.1;
if(keys["d"]) camera.position.x += 0.1;

}


// LOOP
function animate(){

requestAnimationFrame(animate);

move();

renderer.render(scene,camera);

}

animate();

</script>

</body>

</html>
