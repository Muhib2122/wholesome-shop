<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Orders</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#e0f2fe;
}

.header{
background:#0ea5e9;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">My Orders</div>

<div class="container" id="list"></div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

// 🔥 USER FILTER FIX
async function loadOrders(){

let user = localStorage.getItem("user");

if(!user){
list.innerHTML="Login first";
return;
}

let r = await fetch(URL+"/orders");
let d = await r.json();

list.innerHTML="";

let found=false;

d.documents?.forEach(x=>{
let f=x.fields;

let email=f.email?.stringValue;
let amount=f.amount?.integerValue;
let status=f.status?.stringValue;
let tx=f.txid?.stringValue;

if(email===user){

found=true;

list.innerHTML+=`
<div class="card">
TX: ${tx}<br>
Amount: ${amount} BDT<br>
Status: ${status}
</div>
`;

}

});

if(!found){
list.innerHTML="<h3>No Orders</h3>";
}

}

loadOrders();

</script>

</body>
</html>
