<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Orders</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{background:#0ea5e9;color:white;padding:10px;display:flex;align-items:center;gap:10px;}
.header img{width:35px;height:35px;border-radius:50%;}
.container{padding:15px;}
.card{background:white;padding:12px;margin-bottom:10px;border-radius:10px;}
button{margin-top:8px;padding:8px;background:#0ea5e9;color:white;border:none;border-radius:6px;}
</style>
</head>

<body>

<div class="header">
<img src="myshop.jpg">
My Orders
</div>

<div class="container" id="orders"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let user = localStorage.getItem("user");

// ❗ debug দেখার জন্য
console.log("Logged user:", user);

fetch(URL+"/orders")
.then(r=>r.json())
.then(d=>{

orders.innerHTML="";

// ❗ যদি data না থাকে
if(!d.documents){
orders.innerHTML = "<p>No orders found</p>";
return;
}

(d.documents||[]).forEach(doc=>{

let f = doc.fields;

// ❗ SAFE email read
let email = f.email?.stringValue || "N/A";

// 🔥 original logic (same)
if(email !== user) return;

orders.innerHTML += `
<div class="card">
👤 ${email}<br>
💰 ${f.amount.integerValue} BDT<br>
TX: ${f.txid?.stringValue || "-"}<br>
Status: ${f.status.stringValue}<br>

<button onclick="downloadPDF('${f.amount.integerValue}','${f.txid?.stringValue}','${f.status.stringValue}')">
📄 Invoice
</button>
</div>
`;

});

})
.catch(()=>{
orders.innerHTML = "<p>❌ Internet problem</p>";
});

// PDF
function downloadPDF(amount, tx, status){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let img = new Image();
img.src = "myshop.jpg";

img.onload = function(){

doc.addImage(img,'JPEG',10,8,25,25);

doc.setFontSize(18);
doc.text("MyShop Invoice", 50, 20);

doc.setFontSize(10);
doc.text("Date: " + new Date().toLocaleString(), 50, 28);

doc.line(10, 35, 200, 35);

doc.text("Amount: " + amount + " BDT", 15, 50);
doc.text("TX: " + tx, 15, 60);
doc.text("Status: " + status, 15, 70);

doc.save("invoice.pdf");

}

}

</script>
</body>
</html>
