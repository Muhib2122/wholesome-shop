<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;background:#e0f2fe;margin:0;}
.card{background:white;margin:10px;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<h2 style="text-align:center;">My Orders</h2>
<div id="orders"></div>

<script>

let currentUser = localStorage.getItem("user");

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders")
.then(r=>r.json())
.then(d=>{

let html="";

d.documents?.forEach(x=>{
let f=x.fields;

let email=f.userEmail?.stringValue || "";

if(email !== currentUser) return; // 🔥 FILTER

html+=`
<div class="card">
TX: ${f.txid?.stringValue}<br>
Amount: ${f.amount?.integerValue} BDT<br>
Status: ${f.status?.stringValue}
</div>
`;
});

orders.innerHTML = html || "No Orders";

});

</script>

</body>
</html>
