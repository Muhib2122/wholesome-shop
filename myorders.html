<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Orders</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}
.header{background:#0ea5e9;color:white;padding:10px;display:flex;align-items:center;gap:10px;}
.header img{width:35px;height:35px;border-radius:50%;}
.container{padding:15px;}
.card{background:white;padding:12px;margin-bottom:10px;border-radius:10px;}
.status{font-weight:bold;}
button{padding:6px 10px;margin-top:5px;background:#0ea5e9;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<div class="header">
<img src="myshop.jpg">
My Orders
</div>

<div class="container" id="orders"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let user = localStorage.getItem("user");

fetch(URL+"/orders")
.then(r=>r.json())
.then(d=>{

let docs = d.documents || [];
orders.innerHTML="";

docs.forEach(doc=>{
let f = doc.fields;

// 🔥 SAME LOGIC শুধু filter ঠিক করা
if(!f.email || f.email.stringValue !== user) return;

let amount = f.amount.integerValue;
let status = f.status.stringValue;
let tx = f.txid.stringValue;

orders.innerHTML += `
<div class="card">
<div>💰 ${amount} BDT</div>
<div>TX: ${tx}</div>
<div class="status">Status: ${status}</div>

<button onclick="downloadPDF('${amount}','${tx}','${status}')">
📄 Download Invoice
</button>

</div>
`;
});

if(orders.innerHTML===""){
orders.innerHTML="<h3>No Orders</h3>";
}

});

// 🔥 PDF (logo সহ)
function downloadPDF(amount,tx,status){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let img = new Image();
img.src = "myshop.jpg";

img.onload = function(){
doc.addImage(img,'JPEG',15,10,30,30);

doc.text("MyShop Invoice",20,50);
doc.text("Amount: "+amount+" BDT",20,70);
doc.text("TX ID: "+tx,20,80);
doc.text("Status: "+status,20,90);

doc.save("invoice.pdf");
}

}
</script>

</body>
</html>
