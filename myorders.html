<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Orders</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;padding:15px;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.card{background:white;padding:12px;margin-bottom:12px;border-radius:12px;}
input{padding:10px;border-radius:8px;border:1px solid #ccc;width:65%;}
button{padding:10px;border:none;border-radius:8px;background:#0ea5e9;color:white;}
.steps{margin-top:8px;font-size:13px;color:#999;}
.steps span{margin-right:8px;}
.active{color:green;font-weight:bold;}
</style>

</head>

<body>

<div class="header">
<img src="myshop.jpg" width="50">
<h2>My Orders</h2>
</div>

<input id="search" placeholder="Enter Order ID">
<button onclick="searchOrder()">Search</button>

<div id="orders"></div>

<script>

const URL="https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents";

let allOrders=[];

// 🔔 notification
let lastSeen=0;
function notify(list){
if(lastSeen===0){
lastSeen=list.length;
return;
}
if(list.length>lastSeen){
alert("🆕 New update in your orders!");
}
lastSeen=list.length;
}

// load orders
function loadOrders(){
fetch(URL+"/orders")
.then(r=>r.json())
.then(d=>{
let list=(d.documents||[]).sort((a,b)=>{
return new Date(b.createTime)-new Date(a.createTime);
});

notify(list);

allOrders=list;
render(list);
});
}

// render
function render(list){
orders.innerHTML="";

list.forEach(order=>{
let f=order.fields;

let id=f.orderId?.stringValue||"N/A";
let amount=f.amount?.integerValue||0;
let status=f.status?.stringValue||"pending";
let step=f.statusStep?.stringValue||"Pending";

orders.innerHTML+=`
<div class="card">

🆔 ${id}<br>
💰 ${amount} BDT<br>
Status: ${status}<br>
📦 Step: ${step}

<div class="steps">
<span class="${step=="Pending"?"active":""}">Pending</span>
<span class="${step=="Approved"?"active":""}">Approved</span>
<span class="${step=="Processing"?"active":""}">Processing</span>
<span class="${step=="Shipped"?"active":""}">Shipped</span>
<span class="${step=="Delivered"?"active":""}">Delivered</span>
</div>

<br>

<button onclick='downloadPDF(${JSON.stringify(order)})'>Download PDF</button>

</div>
`;
});
}

// search
function searchOrder(){
let val=search.value.toLowerCase();

if(val===""){
render(allOrders);
return;
}

let filtered=allOrders.filter(o=>{
let id=o.fields.orderId?.stringValue||"";
return id.toLowerCase().includes(val);
});

render(filtered);
}

loadOrders();
setInterval(loadOrders,3000);

// ================= PDF FUNCTION (ONLY UPDATED PART) =================

function downloadPDF(order){

let f = order.fields;

// basic info
let orderId = f.orderId?.stringValue || "N/A";
let email = f.email?.stringValue || "N/A";
let status = f.status?.stringValue || "pending";
let step = f.statusStep?.stringValue || "Pending";

// 🧠 CART FIX
let items = [];
try{
items = JSON.parse(f.items?.stringValue || "[]");
}catch(e){
items = [];
}

// qty normalize
let map = {};
items.forEach(i=>{
if(!map[i.name]){
map[i.name]={name:i.name,price:parseInt(i.price||0),qty:1};
}else{
map[i.name].qty++;
}
});

let finalItems=Object.values(map);

// calculation
let subtotal=0;
finalItems.forEach(i=>{
subtotal+=i.price*i.qty;
});

let vat=Math.round(subtotal*0.04);
let total=subtotal+vat;

// time
let orderTime=new Date(order.createTime).toLocaleString();
let now=new Date().toLocaleString();

// html
let html=`
<html>
<head>
<style>
body{font-family:sans-serif;padding:20px;}
h2{text-align:center;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ccc;padding:8px;text-align:center;}
.footer{text-align:center;margin-top:20px;}
</style>
</head>

<body>

<h2>🛍️ WHOLESOME SHOP</h2>

<p><b>Order ID:</b> ${orderId}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Status:</b> ${status} (${step})</p>
<p><b>Order Time:</b> ${orderTime}</p>
<p><b>Download Time:</b> ${now}</p>

<table>
<tr><th>Name</th><th>Qty</th><th>Total</th></tr>

${finalItems.map(i=>`
<tr>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${i.price*i.qty}</td>
</tr>
`).join("")}

<tr><td colspan="2">Subtotal</td><td>${subtotal}</td></tr>
<tr><td colspan="2">VAT (4%)</td><td>${vat}</td></tr>
<tr><td colspan="2"><b>Total</b></td><td><b>${total}</b></td></tr>

</table>

<div class="footer">
<p>Stay connected with us. Thanks for your order sir ❤️</p>
</div>

</body>
</html>
`;

let win=window.open("");
win.document.write(html);
win.document.close();
win.print();
}

</script>

</body>
</html>
