<script>

// 🔔 USER NOTIFICATION SYSTEM

let lastSeenCount = 0;

function notifyUser(newList){

if(lastSeenCount === 0){
lastSeenCount = newList.length;
return;
}

if(newList.length > lastSeenCount){

alert("🆕 New update in your orders!");

}

lastSeenCount = newList.length;

}

// 🔥 modify loadOrders (only add this line)
function loadOrders(){

fetch(URL+"/orders")
.then(r=>r.json())
.then(d=>{

let list = (d.documents||[]).sort((a,b)=>{
return new Date(b.createTime) - new Date(a.createTime);
});

// 🔔 CALL
notifyUser(list);

allOrders = list;

render(allOrders);

});

}

</script>
