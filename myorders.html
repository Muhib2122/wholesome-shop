<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;background:#e0f2fe;margin:0;}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
location.href="auth.html";
}
</script>

<h2 style="text-align:center;">My Orders</h2>

<div id="orders"></div>

<script>

fetch("https://firestore.googleapis.com/v1/projects/wholesome-shop-f4d0f/databases/(default)/documents/orders")
.then(r=>r.json())
.then(d=>{
let html="";

d.documents?.forEach(x=>{
let f=x.fields;

let tx=f.txid?.stringValue || "N/A";
let amount=f.amount?.integerValue || 0;
let status=f.status?.stringValue;

html+=`
<div class="card">
TX: ${tx}<br>
Amount: ${amount} BDT<br>
Status: ${status}
</div>
`;
});

orders.innerHTML=html;
});

</script>

</body>
</html>
