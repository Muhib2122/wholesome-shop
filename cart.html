<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart</title>

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;padding:15px;}

.card{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

button{
padding:5px 10px;
border:none;
border-radius:6px;
background:#0ea5e9;
color:white;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Your Cart</h2>

<div id="cartBox"></div>

<div class="total">
Total: <span id="total">0</span> BDT
</div>

<br>

<button onclick="checkout()">Checkout</button>

<script>

let raw = JSON.parse(localStorage.getItem("cart")||"[]");

// 🔥 GROUP WITH QTY
let cart = [];

raw.forEach(item=>{

let price = parseInt(item.price) || 0;

let existing = cart.find(i=>i.name===item.name);

if(existing){
existing.qty++;
}else{
cart.push({
name:item.name,
price:price,
image:item.image,
qty:1
});
}

});

let cartBox = document.getElementById("cartBox");

// 🔥 RENDER
function render(){

cartBox.innerHTML="";

let sum=0;

cart.forEach((item,index)=>{

let itemTotal = item.price * item.qty;
sum += itemTotal;

cartBox.innerHTML+=`
<div class="card">

<div>
<b>${item.name}</b><br>
${item.price} BDT
</div>

<div class="qty">
<button onclick="dec(${index})">-</button>
${item.qty}
<button onclick="inc(${index})">+</button>
</div>

<div>
${itemTotal} BDT<br>
<button onclick="removeItem(${index})">❌</button>
</div>

</div>
`;

});

// TOTAL SAFE
document.getElementById("total").innerText = sum;

// 🔥 SAVE BACK (flatten)
let save=[];
cart.forEach(i=>{
for(let k=0;k<i.qty;k++){
save.push({
name:i.name,
price:i.price,
image:i.image
});
}
});

localStorage.setItem("cart",JSON.stringify(save));

}

// ➕
function inc(i){
cart[i].qty++;
render();
}

// ➖
function dec(i){
cart[i].qty--;

if(cart[i].qty<=0){
cart.splice(i,1);
}

render();
}

// ❌
function removeItem(i){
cart.splice(i,1);
render();
}

// checkout unchanged
function checkout(){
location.href="checkout.html";
}

render();

</script>

</body>
</html>
