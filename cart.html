<!DOCTYPE html>
<html>

<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;">Your Cart</h2>

<div id="cart-box" style="max-width:600px;margin:auto;"></div>

<div style="text-align:center;margin-top:20px;">
<button onclick="goCheckout()">Checkout</button>
</div>

<script src="cart.js"></script>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let box = document.getElementById("cart-box");

let total = 0;

if(cart.length === 0){
box.innerHTML = "<h3 style='text-align:center;'>Cart is empty</h3>";
}

cart.forEach((item,index)=>{

let div = document.createElement("div");

div.style = "background:white;padding:15px;margin:10px;display:flex;justify-content:space-between;";

div.innerHTML = `
<span>${item.name} (${item.price} BDT)</span>
<button onclick="removeFromCart(${index})">Remove</button>
`;

box.appendChild(div);

total += item.price;

});

let totalDiv = document.createElement("h3");
totalDiv.innerText = "Total: " + total + " BDT";
totalDiv.style.textAlign = "center";

box.appendChild(totalDiv);

</script>

</body>
</html>
