<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;">Your Cart</h2>

<div id="cart-box" style="max-width:600px;margin:auto;"></div>

<script src="cart.js"></script>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let box = document.getElementById("cart-box");

let total = 0;

cart.forEach((item,index)=>{

box.innerHTML += `
<div style="background:white;padding:15px;margin:10px;display:flex;justify-content:space-between;">
<span>${item.name} (${item.price} BDT)</span>
<button onclick="removeFromCart(${index})">Remove</button>
</div>
`;

total += item.price;

});

box.innerHTML += `<h3>Total: ${total} BDT</h3>`;

</script>

</body>
</html>
