<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:sans-serif;background:#e0f2fe;}

.header{
background:#0ea5e9;
color:white;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.header img{width:35px;height:35px;border-radius:50%;}

.container{padding:15px;}

.card{
background:white;
padding:15px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}

.qty button{
padding:4px 8px;
background:#0ea5e9;
color:white;
border:none;
border-radius:5px;
}

.total{
font-weight:bold;
margin-top:10px;
}

button.checkout{
width:100%;
padding:12px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<img src="images/logo.png">
<b>Your Cart</b>
</div>

<div class="container">
<div class="card" id="cartBox"></div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

function renderCart(){

cartBox.innerHTML="";

let total=0;

cart.forEach((p,i)=>{
total+=p.price*p.qty;

cartBox.innerHTML+=`
<div class="row">
<div>${p.name}</div>

<div>
<button onclick="minus(${i})">➖</button>
${p.qty}
<button onclick="plus(${i})">➕</button>
<button onclick="removeItem(${i})">❌</button>
</div>

<div>${p.price*p.qty}</div>
</div>
`;
});

let vat=Math.floor(total*0.05);
let final=total+vat;

cartBox.innerHTML+=`
<hr>
<div class="total">Total: ${final} BDT</div>
<button class="checkout" onclick="location.href='checkout.html'">Checkout</button>
`;
}

function plus(i){cart[i].qty++;save();}
function minus(i){if(cart[i].qty>1)cart[i].qty--;save();}
function removeItem(i){cart.splice(i,1);save();}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

renderCart();

</script>

</body>
</html>
