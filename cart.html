<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;">Your Cart</h2>

<div id="cart-box" style="max-width:600px;margin:auto;"></div>

<div style="text-align:center;margin-top:20px;">
<button onclick="goCheckout()">Proceed to Checkout</button>
</div>

<script src="cart.js"></script>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let box = document.getElementById("cart-box");

let total = 0;

if(cart.length === 0){
box.innerHTML = "<h3 style='text-align:center;'>Cart is empty</h3>";
}

cart.forEach((item,index)=>{

box.innerHTML += `
<div style="background:white;padding:15px;margin:10px;display:flex;justify-content:space-between;align-items:center;">
<div>
<strong>${item.name}</strong><br>
${item.price} BDT
</div>

<button onclick="removeFromCart(${index})">Remove</button>

</div>
`;

total += item.price;

});

box.innerHTML += `<h3 style="text-align:center;">Total: ${total} BDT</h3>`;

</script>

</body>
</html>
