<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
font-family:sans-serif;
background:#e0f2fe;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}
input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}
button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
background:#0ea5e9;
color:white;
font-weight:bold;
}
.google{background:#ef4444;}
</style>

</head>
<body>

<div class="card">
<h2>Login / Signup</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>
<button onclick="login()">Login</button>
<button class="google" onclick="googleLogin()">Google Login</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
sendEmailVerification,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SIGNUP
window.signup = async ()=>{
let email=email.value;
let pass=pass.value;

let u=await createUserWithEmailAndPassword(auth,email,pass);
await sendEmailVerification(u.user);

alert("Verification sent to email");
}

// LOGIN
window.login = async ()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

let u=await signInWithEmailAndPassword(auth,email,pass);

if(!u.user.emailVerified){
alert("Verify email first");
return;
}

localStorage.setItem("user",u.user.email);
location.href="index.html";
}

// GOOGLE
window.googleLogin = async ()=>{
let provider=new GoogleAuthProvider();
let r=await signInWithPopup(auth,provider);

localStorage.setItem("user",r.user.email);
location.href="index.html";
}

</script>

</body>
</html>
