<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login / Signup</title>

<style>
body{font-family:sans-serif;background:#e0f2fe;padding:20px;}
.card{background:white;padding:15px;border-radius:10px;}
input{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
button{padding:10px;border:none;border-radius:6px;background:#0ea5e9;color:white;width:100%;}
</style>

</head>
<body>

<div class="card">

<h3>Login / Signup</h3>

<input id="name" placeholder="Full Name">
<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">

<div style="display:flex;gap:5px;">
<input id="code" placeholder="Enter Code">
<button onclick="sendCode()">Send</button>
</div>

<button onclick="verify()">Signup / Login</button>

<hr>

<button onclick="googleLogin()">Login with Google</button>

</div>

<script>

// 🔥 TEMP STORE
let generatedCode = "";

// 🔥 SEND CODE (FAKE OTP SIMULATION)
function sendCode(){
generatedCode = Math.floor(100000 + Math.random()*900000).toString();
alert("Your code: "+generatedCode);
}

// 🔥 VERIFY + SAVE USER
function verify(){

let name = nameInput();
let usernameVal = usernameInput();
let emailVal = emailInput();
let passVal = passInput();
let codeVal = document.getElementById("code").value;

if(!emailVal || !passVal){
alert("Fill required fields");
return;
}

// OTP check
if(generatedCode && codeVal !== generatedCode){
alert("Wrong Code");
return;
}

// SAVE USER
let userData = {
name:name,
username:usernameVal,
email:emailVal,
password:passVal
};

localStorage.setItem("user", emailVal);
localStorage.setItem("userData", JSON.stringify(userData));

location.href="index.html";
}

// 🔥 GOOGLE LOGIN
function googleLogin(){

let email = prompt("Enter your Google email");

if(!email) return;

// first time → ask details
if(!localStorage.getItem("userData_"+email)){

let name = prompt("Enter Full Name");
let username = prompt("Enter Username");
let pass = prompt("Set Password");

let data = {name,username,email,password:pass};

localStorage.setItem("userData_"+email, JSON.stringify(data));

}

localStorage.setItem("user", email);

location.href="index.html";
}

// helpers
function nameInput(){return document.getElementById("name").value;}
function usernameInput(){return document.getElementById("username").value;}
function emailInput(){return document.getElementById("email").value;}
function passInput(){return document.getElementById("pass").value;}

</script>

</body>
</html>
